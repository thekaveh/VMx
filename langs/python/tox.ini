[tox]
envlist = py310, py311, py312, py313, lint, type
isolated_build = true

[testenv]
deps =
    pytest>=7
    pytest-asyncio>=0.23
    pytest-cov>=4
commands =
    pytest --cov=vmx --cov-report=term {posargs}

[testenv:lint]
deps = ruff>=0.4
commands =
    ruff check src tests
    ruff format --check src tests

[testenv:type]
deps =
    mypy>=1.8
commands =
    mypy --strict src/vmx
