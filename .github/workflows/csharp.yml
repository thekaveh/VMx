name: csharp

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "langs/csharp/**"
      - "examples/csharp/**"
      - "spec/**"
      - ".github/workflows/csharp.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "langs/csharp/**"
      - "examples/csharp/**"
      - "spec/**"
      - ".github/workflows/csharp.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: langs/csharp

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Install both SDKs:
      # - 8.0.x: required to build the library's net8.0 TFM
      # - 9.0.x: required to run VMx.Tests (which targets net9.0; see VMx.Tests.csproj)
      - name: Setup .NET 8 + .NET 9
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          cache: true
          cache-dependency-path: langs/csharp/**/packages.lock.json

      - name: Restore
        # --locked-mode pairs with <RestorePackagesWithLockFile> in
        # Directory.Build.props: CI fails fast if a checked-in packages.lock.json
        # is out of date with the csproj graph, so dependency changes can't
        # silently skip the lockfile update.
        run: dotnet restore VMx.sln --locked-mode

      - name: Format check
        run: dotnet format VMx.sln --verify-no-changes

      - name: Build
        run: dotnet build VMx.sln -c Release --no-restore

      - name: Test
        run: dotnet test VMx.sln -c Release --no-build --collect:"XPlat Code Coverage" --results-directory ./TestResults --logger "trx"

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: langs/csharp/TestResults/**/coverage.cobertura.xml
          flags: csharp
          fail_ci_if_error: false

  examples:
    # Builds + tests the Notes-Showcase Avalonia example (Phase 8 of the
    # notes-showcase plan). Lives under `examples/csharp/avalonia/` and
    # references the library via ProjectReference (not NuGet), so it must run
    # in the same CI as `build` above. Kept as a separate job because the
    # existing `build` job pins `defaults.run.working-directory: langs/csharp`
    # and gates restore on packages.lock.json; the example has no lockfile.
    name: examples (notes-showcase)
    runs-on: ubuntu-latest
    # Override workflow-level `defaults.run.working-directory: langs/csharp` so
    # `dotnet build/test` resolve example project paths from the repo root.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET 8 + .NET 9
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          cache: true
          cache-dependency-path: |
            langs/csharp/**/packages.lock.json
            examples/csharp/avalonia/**/packages.lock.json

      - name: Restore NotesShowcase app
        run: dotnet restore examples/csharp/avalonia/NotesShowcase/NotesShowcase.csproj --locked-mode

      - name: Restore NotesShowcase tests
        run: dotnet restore examples/csharp/avalonia/NotesShowcase.Tests/NotesShowcase.Tests.csproj --locked-mode

      - name: Build NotesShowcase
        run: dotnet build examples/csharp/avalonia/NotesShowcase/NotesShowcase.csproj --no-restore

      - name: Test NotesShowcase
        run: dotnet test examples/csharp/avalonia/NotesShowcase.Tests/NotesShowcase.Tests.csproj --no-restore --logger "console;verbosity=normal"

      - name: Run console example
        run: dotnet run --project examples/csharp/console/HelloVMx/HelloVMx.csproj

      - name: Build WPF example
        run: dotnet build examples/csharp/wpf/TodoApp/WpfTodoApp.csproj
