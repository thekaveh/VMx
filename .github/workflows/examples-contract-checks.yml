name: examples-contract-checks

permissions:
  contents: read

# Runs the Phase 6 Pure-VM contract + parity scripts. These tools enforce
# architectural invariants on the flagship example apps:
#   * check-axaml-codebehind.py — Avalonia views must not embed business logic
#   * check-textual-views.py    — Textual views must not own VM state
#   * check-layer-imports.py    — cross-layer (models <-> viewmodels <-> views)
#                                 imports stay one-way (M <- VM <- V)
#   * check-showcase-parity.py  — all four UI-backed examples expose the same VM surface
#
# They live at the repo root under tools/ so they are language-agnostic; this
# workflow is the single integration point that fails CI if any contract drifts.

on:
  push:
    branches: [main, develop]
    paths:
      - "examples/**"
      - "tools/check-axaml-codebehind.py"
      - "tools/check-textual-views.py"
      - "tools/check-layer-imports.py"
      - "tools/check-showcase-parity.py"
      - ".github/workflows/examples-contract-checks.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "examples/**"
      - "tools/check-axaml-codebehind.py"
      - "tools/check-textual-views.py"
      - "tools/check-layer-imports.py"
      - "tools/check-showcase-parity.py"
      - ".github/workflows/examples-contract-checks.yml"
  workflow_dispatch:

jobs:
  contract:
    name: Pure-VM contract + parity checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: axaml code-behind check
        run: python3 tools/check-axaml-codebehind.py

      - name: textual views check
        run: python3 tools/check-textual-views.py

      - name: cross-layer imports check
        run: python3 tools/check-layer-imports.py

      - name: showcase parity check
        run: python3 tools/check-showcase-parity.py
