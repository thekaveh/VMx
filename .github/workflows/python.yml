name: python

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "langs/python/**"
      - "examples/python/**"
      - "spec/**"
      - ".github/workflows/python.yml"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

defaults:
  run:
    working-directory: langs/python

jobs:
  build:
    name: build & test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            langs/python/pyproject.toml
            langs/python/uv.lock

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --locked --all-extras

      - name: Audit runtime dependencies
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.14'
        run: |
          uv export --locked --no-dev --no-emit-project --output-file /tmp/vmx-runtime.txt
          uvx --from pip-audit==2.10.1 pip-audit --requirement /tmp/vmx-runtime.txt

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy --strict src/vmx

      - name: Pytest
        run: uv run pytest --cov=vmx --cov-report=xml -v

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: langs/python/coverage.xml
          flags: python
          fail_ci_if_error: false

  examples:
    # Syncs + tests the Notes-Showcase Textual example (Phase 8 of the
    # notes-showcase plan). Kept as a separate job because the existing
    # `build` job pins `defaults.run.working-directory: langs/python` and runs
    # a 3-OS × 5-python matrix; the example only needs a single combo to
    # confirm the showcase package builds against the workspace-local
    # `vmx` (editable, path-sourced in pyproject.toml).
    name: examples (notes-showcase)
    runs-on: ubuntu-latest
    # Override workflow-level `defaults.run.working-directory: langs/python` so
    # `uv --directory examples/...` resolves from the repo root.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            examples/python/textual/notes_showcase/pyproject.toml
            examples/python/textual/notes_showcase/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: notes-showcase sync
        # `dev` is declared under [dependency-groups] in the showcase's
        # pyproject.toml (PEP 735), not [project.optional-dependencies]; uv
        # syncs default dependency groups automatically, so no --extra/--group
        # flag is needed for pytest to be present.
        run: uv sync --locked --directory examples/python/textual/notes_showcase

      - name: notes-showcase ruff lint
        run: uv run --directory examples/python/textual/notes_showcase ruff check

      - name: notes-showcase ruff format check
        run: uv run --directory examples/python/textual/notes_showcase ruff format --check

      - name: notes-showcase mypy strict
        run: uv run --directory examples/python/textual/notes_showcase mypy --strict src

      - name: notes-showcase tests
        run: uv run --directory examples/python/textual/notes_showcase pytest

  small-examples:
    name: examples (console + tk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            examples/python/pyproject.toml
            examples/python/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync examples
        run: uv sync --locked --directory examples/python

      - name: Ruff lint
        run: uv run --directory examples/python ruff check console tk

      - name: Ruff format check
        run: uv run --directory examples/python ruff format --check console tk

      - name: Mypy strict
        run: uv run --directory examples/python mypy --strict console tk

      - name: Run console example
        run: uv run --directory examples/python python -m hello_vmx

      - name: Compile Tk example
        run: uv run --directory examples/python python -m compileall tk/todo_app

  inspector:
    # vmx_inspector (Textual TUI) is a separate standalone uv project; gate it
    # under the same ruff/mypy/pytest standards as the lib + showcase so the
    # quality bar stays uniform across all Python examples.
    name: examples (vmx-inspector)
    runs-on: ubuntu-latest
    # Override workflow-level `defaults.run.working-directory: langs/python` so
    # `uv --directory examples/...` resolves from the repo root.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
          enable-cache: true
          cache-dependency-glob: |
            examples/python/textual/inspector/pyproject.toml
            examples/python/textual/inspector/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: inspector sync
        run: uv sync --locked --directory examples/python/textual/inspector

      - name: inspector ruff lint
        run: uv run --directory examples/python/textual/inspector ruff check

      - name: inspector ruff format check
        run: uv run --directory examples/python/textual/inspector ruff format --check

      - name: inspector mypy strict
        run: uv run --directory examples/python/textual/inspector mypy --strict src

      - name: inspector tests
        run: uv run --directory examples/python/textual/inspector pytest

  package:
    name: package (wheel + sdist)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
      - name: Set up Python
        run: uv python install 3.12
      - name: Build wheel and sdist
        run: uv build --project langs/python --out-dir dist
      - name: Test extracted sdist
        run: |
          set -euo pipefail
          extract_dir="$(mktemp -d)"
          tar -xzf dist/*.tar.gz -C "$extract_dir"
          sdist_root="$(find "$extract_dir" -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$sdist_root"
          uv sync --project "$sdist_root" --locked --all-extras
          uv run --project "$sdist_root" pytest "$sdist_root/tests/conformance" -q

  required:
    name: "required: python"
    if: always()
    needs: [build, examples, small-examples, inspector, package]
    runs-on: ubuntu-latest
    # This aggregator job has no checkout, so override the workflow-level
    # `defaults.run.working-directory: langs/python` (which would not exist here)
    # back to the workspace root so the jq gate can start.
    defaults:
      run:
        working-directory: .
    steps:
      - name: Require every Python job
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq -e 'to_entries | all(.value.result == "success")' <<<"$RESULTS"
