name: python

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "langs/python/**"
      - "examples/python/**"
      - "spec/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "langs/python/**"
      - "examples/python/**"
      - "spec/**"
      - ".github/workflows/python.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: langs/python

jobs:
  build:
    name: build & test (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          # uv.lock is gitignored in this repo (library project, no committed lock);
          # cache key derives purely from the manifest. If a lockfile is committed
          # in the future, re-add `langs/python/uv.lock` to this glob.
          cache-dependency-glob: |
            langs/python/pyproject.toml

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy --strict src/vmx

      - name: Pytest
        run: uv run pytest --cov=vmx --cov-report=xml -v

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: langs/python/coverage.xml
          flags: python
          fail_ci_if_error: false

  examples:
    # Syncs + tests the Notes-Showcase Textual example (Phase 8 of the
    # notes-showcase plan). Kept as a separate job because the existing
    # `build` job pins `defaults.run.working-directory: langs/python` and runs
    # a 3-OS × 4-python matrix; the example only needs a single combo to
    # confirm the showcase package builds against the workspace-local
    # `vmx` (editable, path-sourced in pyproject.toml).
    name: examples (notes-showcase)
    runs-on: ubuntu-latest
    # Override workflow-level `defaults.run.working-directory: langs/python` so
    # `uv --directory examples/...` resolves from the repo root.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: |
            examples/python/textual/notes_showcase/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: notes-showcase sync
        # `dev` is declared under [dependency-groups] in the showcase's
        # pyproject.toml (PEP 735), not [project.optional-dependencies]; uv
        # syncs default dependency groups automatically, so no --extra/--group
        # flag is needed for pytest to be present.
        run: uv sync --directory examples/python/textual/notes_showcase

      - name: notes-showcase ruff lint
        run: uv run --directory examples/python/textual/notes_showcase ruff check

      - name: notes-showcase ruff format check
        run: uv run --directory examples/python/textual/notes_showcase ruff format --check

      - name: notes-showcase mypy strict
        run: uv run --directory examples/python/textual/notes_showcase mypy --strict src

      - name: notes-showcase tests
        run: uv run --directory examples/python/textual/notes_showcase pytest

  small-examples:
    name: examples (console + tk)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: |
            examples/python/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync examples
        run: uv sync --directory examples/python

      - name: Run console example
        run: uv run --directory examples/python python -m hello_vmx

      - name: Compile Tk example
        run: uv run --directory examples/python python -m compileall tk/todo_app

  inspector:
    # vmx_inspector (Textual TUI) is a separate standalone uv project; gate it
    # under the same ruff/mypy/pytest standards as the lib + showcase so the
    # quality bar stays uniform across all Python examples.
    name: examples (vmx-inspector)
    runs-on: ubuntu-latest
    # Override workflow-level `defaults.run.working-directory: langs/python` so
    # `uv --directory examples/...` resolves from the repo root.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: |
            examples/python/textual/inspector/pyproject.toml

      - name: Set up Python
        run: uv python install 3.12

      - name: inspector sync
        run: uv sync --directory examples/python/textual/inspector

      - name: inspector ruff lint
        run: uv run --directory examples/python/textual/inspector ruff check

      - name: inspector ruff format check
        run: uv run --directory examples/python/textual/inspector ruff format --check

      - name: inspector mypy strict
        run: uv run --directory examples/python/textual/inspector mypy --strict src

      - name: inspector tests
        run: uv run --directory examples/python/textual/inspector pytest
