name: docs

on:
  push:
    branches: [main, develop]
    paths:
      - "docs/**"
      - "README.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "CODE_OF_CONDUCT.md"
      - "compatibility-matrix.md"
      - "examples/**/*.md"
      - "langs/**/*.md"
      - "tools/**/*.md"
      - "spec/**"
      - "assets/architecture.*"
      - "assets/class-diagram.*"
      - "examples/assets/notes-showcase-vm-hierarchy.*"
      - "examples/assets/notes-showcase-vmx-components.*"
      - "examples/notes-showcase-parity.md"
      - "scripts/docs/**"
      - "tests/docs/**"
      - "tools/generate-doc-diagrams.py"
      - "tools/docs/validate_diagrams.py"
      - "Makefile"
      - "docs/requirements.txt"
      - "docs/requirements.in"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            librsvg2-bin=2.58.0+dfsg-1build1 \
            pngquant=2.18.0-1build2
          python -m pip install --require-hashes -r docs/requirements.txt
      - name: Audit docs dependencies
        run: python -m pip_audit --local
      - name: Check docs
        run: make docs-check
      - name: Configure Pages
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
        with:
          enablement: true
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  required:
    name: "required: docs"
    if: always()
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Require documentation build
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq -e 'to_entries | all(.value.result == "success")' <<<"$RESULTS"
