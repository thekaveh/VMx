name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "spec/**"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "spec/**"
      - ".github/workflows/docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder — docs site not yet wired up (no docs/mkdocs.yml)
        run: |
          echo "docs build will be wired up once mkdocs config lands"
          # TODO: replace with `mkdocs build --strict` once docs/mkdocs.yml exists.
          # The current existence check is a placeholder that always passes.
          test -d docs/superpowers || (echo "docs dir missing" && exit 1)
