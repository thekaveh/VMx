name: release-please

# release-please watches main for Conventional Commits and maintains a
# long-lived "release PR" per package that bumps the version + updates
# CHANGELOG.md according to what's accumulated since the last tag.
# Merging that PR pushes a `python-v<X.Y.Z>` tag (the component prefix
# comes from release-please-config.json's `component: python` setting,
# which keeps tags coexisting with future `csharp-v*`, `typescript-v*`,
# and `swift-v*` flavors), which fires `release.yml`'s tag-triggered
# publish pipeline.
#
# Human gate stays on the release PR merge: review the version bump,
# review the auto-generated CHANGELOG entry, then merge → tag fires →
# publish runs → environment approval gates the actual PyPI upload.

on:
  push:
    branches: [main]

# release-please needs to push commits to its release branch and open
# PRs against main. Everything else stays read-only.
permissions:
  contents: write
  pull-requests: write

# Serialize release-PR maintenance: concurrent runs both push to the release
# branch / update the release PR and can conflict (the action recommends a
# concurrency group).
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Check release-please source and manifest state
        id: release-state
        run: python3 tools/check-release-please-state.py --github-output "$GITHUB_OUTPUT"
      - name: Maintain Python release PR
        if: steps.release-state.outputs.ready == 'true'
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
