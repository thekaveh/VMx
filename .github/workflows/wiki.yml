name: wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/assets/diagrams/**"
      - "docs/content/**"
      - "docs/maintenance/**"
      - "docs/manifest.yaml"
      - "spec/VERSION"
      - "scripts/docs/**"
      - "tools/docs/validate_diagrams.py"
      - "Makefile"
      - "docs/requirements.txt"
      - "docs/requirements.in"
      - ".github/workflows/wiki.yml"
  workflow_dispatch:

# Serialize wiki publishes: the job clones the wiki repo fresh and pushes to
# master with a non-force push, so two overlapping runs would race and the
# loser would fail on a non-fast-forward push.
concurrency:
  group: wiki
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            librsvg2-bin=2.58.0+dfsg-1build1 \
            pngquant=2.18.0-1build2
          python -m pip install --require-hashes -r docs/requirements.txt
      - name: Audit docs dependencies
        run: python -m pip_audit --local
      - name: Generate wiki
        run: python -m scripts.docs.build_docs --wiki
      - name: Validate diagrams
        run: |
          python docs/assets/diagrams/generate_diagrams.py --check
          python -m scripts.docs.validate_diagrams
      - name: Install wiki deploy key when configured
        env:
          WIKI_DEPLOY_KEY_VALUE: ${{ secrets.WIKI_DEPLOY_KEY }}
        run: |
          if [ -n "$WIKI_DEPLOY_KEY_VALUE" ]; then
            mkdir -p ~/.ssh
            printf '%s\n' "$WIKI_DEPLOY_KEY_VALUE" > ~/.ssh/wiki_key
            chmod 600 ~/.ssh/wiki_key
          fi
      - name: Publish wiki
        env:
          WIKI_DEPLOY_KEY: /home/runner/.ssh/wiki_key
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if [ -s "$WIKI_DEPLOY_KEY" ]; then
            python -m scripts.docs.push_wiki --push
          else
            WIKI_REMOTE="https://x-access-token:${{ github.token }}@github.com/thekaveh/VMx.wiki.git" \
              python -m scripts.docs.push_wiki --push
          fi
      - name: Verify published wiki
        run: python -m scripts.docs.push_wiki --check-published
