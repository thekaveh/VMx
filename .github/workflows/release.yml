name: release

on:
  push:
    tags:
      - "csharp-v*"
      - "python-v*"
      - "typescript-v*"
      - "swift-v*"
  # No workflow_dispatch: every job gates on `startsWith(github.ref,
  # 'refs/tags/…')`, so a manual dispatch from a branch silently did nothing.
  # Releases are tag-driven only; re-add dispatch only together with
  # ref-resolution logic in the jobs.

# Serialise per-tag publish runs. `cancel-in-progress: false` because once
# a PyPI upload is in flight the artifact is permanent (yank-not-delete);
# we'd rather let the in-flight run finish than abort it mid-step. The
# group is keyed on the tag ref, so independent flavors' tags
# (e.g. python-v2.6.0 vs typescript-v2.6.0) run concurrently as intended.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  csharp-build:
    if: startsWith(github.ref, 'refs/tags/csharp-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify tag commit is on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point at commits reachable from origin/main." >&2
            exit 1
          fi
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          cache: true
          cache-dependency-path: langs/csharp/**/packages.lock.json
      - name: Select exact tag-matching projects
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/csharp-v}"
          python3 - "$tag_version" <<'PY'
          import json
          import pathlib
          import re
          import sys
          import xml.etree.ElementTree as ET

          version = sys.argv[1]
          if re.fullmatch(r"[0-9]+\.[0-9]+\.[0-9]+", version) is None:
              raise SystemExit(f"invalid stable C# release tag version: {version}")
          selected = []
          for project in sorted(pathlib.Path("langs/csharp/src").glob("*/*.csproj")):
              root = ET.parse(project).getroot()
              package_id = root.findtext("PropertyGroup/PackageId")
              project_version = root.findtext("PropertyGroup/Version")
              if package_id and project_version == version:
                  selected.append({
                      "id": package_id,
                      "version": version,
                      "nupkg": f"{package_id}.{version}.nupkg",
                      "snupkg": f"{package_id}.{version}.snupkg",
                  })
          if not selected:
              raise SystemExit(f"no C# package project has Version {version}")
          pathlib.Path("/tmp/csharp-release-manifest.json").write_text(
              json.dumps(selected, indent=2) + "\n", encoding="utf-8"
          )
          PY
          cat /tmp/csharp-release-manifest.json
      - name: Restore
        run: dotnet restore langs/csharp/VMx.sln --locked-mode
      - name: Format
        run: dotnet format langs/csharp/VMx.sln --verify-no-changes --no-restore
      - name: Build
        run: dotnet build langs/csharp/VMx.sln -c Release --no-restore --nologo
      - name: Test
        run: dotnet test langs/csharp/VMx.sln -c Release --no-build --nologo
      - name: Pack all public projects
        run: |
          set -euo pipefail
          mkdir -p /tmp/all-nupkgs
          for project in langs/csharp/src/*/*.csproj; do
            dotnet pack "$project" -c Release --no-build --nologo -o /tmp/all-nupkgs
          done
      - name: Check all package and symbol contracts
        run: python3 tools/check-nuget-package.py --package-dir /tmp/all-nupkgs
      - name: Verify local net8.0 consumer
        run: >-
          python3 tools/smoke-nuget-consumer.py
          --project-root langs/csharp/src
          --framework net8.0
          --package-dir /tmp/all-nupkgs
      - name: Verify local netstandard2.0 consumer
        run: >-
          python3 tools/smoke-nuget-consumer.py
          --project-root langs/csharp/src
          --framework netstandard2.0
          --package-dir /tmp/all-nupkgs
      - name: Stage only selected immutable artifacts
        run: |
          set -euo pipefail
          mkdir -p /tmp/release-nupkgs
          cp /tmp/csharp-release-manifest.json /tmp/release-nupkgs/manifest.json
          python3 - <<'PY'
          import json
          import pathlib
          import shutil

          source = pathlib.Path("/tmp/all-nupkgs")
          target = pathlib.Path("/tmp/release-nupkgs")
          manifest = json.loads(pathlib.Path("/tmp/csharp-release-manifest.json").read_text())
          for package in manifest:
              shutil.copy2(source / package["nupkg"], target)
              shutil.copy2(source / package["snupkg"], target)
          PY
      - name: Upload selected package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: csharp-release-${{ github.run_id }}
          path: /tmp/release-nupkgs
          if-no-files-found: error

  csharp-publish:
    needs: csharp-build
    if: startsWith(github.ref, 'refs/tags/csharp-v')
    runs-on: ubuntu-latest
    environment:
      name: nuget-csharp
      url: https://www.nuget.org/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download selected package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: csharp-release-${{ github.run_id }}
          path: /tmp/release-nupkgs
      - name: Verify NuGet profile is configured
        env:
          NUGET_USER: ${{ secrets.NUGET_USER }}
        run: |
          if [ -z "$NUGET_USER" ]; then
            echo "::error::The protected environment must define NUGET_USER." >&2
            exit 1
          fi
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x
      - name: NuGet login (OIDC to temporary API key)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        with:
          user: ${{ secrets.NUGET_USER }}
      - name: Push exact selected packages and symbols
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/csharp-main-packages.txt
          import json
          import pathlib

          root = pathlib.Path("/tmp/release-nupkgs")
          for package in json.loads((root / "manifest.json").read_text()):
              print(root / package["nupkg"])
          PY
          while IFS= read -r package; do
            dotnet nuget push "$package" \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
              --source https://api.nuget.org/v3/index.json
          done < /tmp/csharp-main-packages.txt

  csharp-verify-published:
    needs: csharp-publish
    if: startsWith(github.ref, 'refs/tags/csharp-v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        framework: ["net8.0", "netstandard2.0"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 8.0.x
      - name: Download release manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: csharp-release-${{ github.run_id }}
          path: /tmp/release-nupkgs
      - name: Poll and verify exact public consumer
        run: |
          set -euo pipefail
          packages=()
          while IFS= read -r specification; do
            packages+=(--package "$specification")
          done < <(python3 - <<'PY'
          import json
          import pathlib

          manifest = json.loads(pathlib.Path("/tmp/release-nupkgs/manifest.json").read_text())
          for package in manifest:
              print(f"{package['id']}={package['version']}")
          PY
          )
          python3 tools/smoke-nuget-consumer.py \
            "${packages[@]}" \
            --framework "${{ matrix.framework }}" \
            --poll-timeout 900

  csharp-release-notes:
    needs: csharp-verify-published
    if: startsWith(github.ref, 'refs/tags/csharp-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Download release manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: csharp-release-${{ github.run_id }}
          path: /tmp/release-nupkgs
      - name: Render package-specific release notes
        run: >-
          python3 tools/render-csharp-release-notes.py
          --manifest /tmp/release-nupkgs/manifest.json
          --changelog langs/csharp/CHANGELOG.md
          --output /tmp/csharp-release-notes.md
      - name: Create C# GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title "C# NuGet ${tag#csharp-v}" \
            --notes-file /tmp/csharp-release-notes.md \
            --target "$GITHUB_SHA"

  python-test:
    # Gate: full test matrix before letting the publish job run. Without
    # this, a tag push on a red branch would still publish to PyPI
    # (versions can be yanked but not deleted — a poisoned release is
    # permanent). The matrix mirrors `python.yml`'s pull-request gate on
    # the `python-version` dimension (3.10..3.13); the OS dimension is
    # restricted to `ubuntu-latest` because release artifacts are pure-
    # Python (`py3-none-any` wheel) and the PR gate already exercises
    # macOS + Windows on every push to main.
    name: python — test before release
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify tag commit is on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point at commits reachable from origin/main." >&2
            exit 1
          fi
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: |
            langs/python/pyproject.toml
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        working-directory: langs/python
        run: uv sync --all-extras
      - name: Ruff lint
        working-directory: langs/python
        run: uv run ruff check src tests
      - name: Ruff format check
        working-directory: langs/python
        run: uv run ruff format --check src tests
      - name: mypy --strict
        working-directory: langs/python
        run: uv run mypy --strict src/vmx
      - name: pytest
        working-directory: langs/python
        run: uv run pytest

  python-build-and-publish:
    # OIDC-based PyPI trusted publishing — no API token in repo secrets.
    # The PyPI project `vmx` is configured with a Trusted Publisher pointing
    # to this repo + workflow + environment `pypi-python`. The environment
    # has a required-reviewer rule (see langs/python/RELEASING.md §1.2), so
    # the publish job pauses for approval before any irreversible PyPI
    # upload.
    name: python — build & publish
    needs: python-test
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi-python
      url: https://pypi.org/p/vmx
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          # VMx is a library project — uv.lock is gitignored (matches
          # python.yml's cache-key derivation). Override the default
          # `**/uv.lock` glob so setup-uv doesn't error out searching for
          # a lockfile we deliberately don't track.
          cache-dependency-glob: |
            langs/python/pyproject.toml
      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches package version
        # PyPI uploads are permanent (yank-not-delete), so a typo'd tag
        # (python-v2.6.1 against a 2.6.0 __about__.py) MUST abort before
        # publish. verify-published would only catch it after the
        # irreversible upload.
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/python-v}"
          pkg_version=$(uv run --project langs/python python -c \
            "from vmx.__about__ import __version__; print(__version__)")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package version ($pkg_version). Bump langs/python/src/vmx/__about__.py before tagging." >&2
            exit 1
          fi
          echo "Tag $tag_version matches package version $pkg_version."

      - name: Build wheel and sdist
        run: uv build --project langs/python --out-dir dist

      - name: Twine check
        # Catches common metadata issues (missing long_description, invalid
        # RST/MD, malformed classifiers) before uploading. Cheap pre-flight.
        run: |
          set -euo pipefail
          uv tool run --from "twine==6.2.0" twine check dist/*

      - name: Publish to PyPI
        # Sigstore attestations (`attestations: true`, PEP 740) ship signed
        # provenance alongside the sdist and wheel.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          attestations: true

  python-verify-published:
    # Install the just-published release in a clean venv and import-check
    # it. PyPI's CDN can lag tens of seconds after a successful upload, so
    # retry up to 5 times with 30s backoff. Each attempt starts from a
    # fresh venv to ensure a partial install on attempt N can't mask the
    # regression on attempt N+1. No pip cache — fresh resolution catches
    # PyPI propagation lag honestly.
    name: python — verify published
    needs: python-build-and-publish
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Wait for PyPI CDN + install in fresh venv
        run: |
          set -e
          version="${GITHUB_REF#refs/tags/python-v}"
          for attempt in 1 2 3 4 5; do
            rm -rf .verify-venv
            python -m venv .verify-venv
            if .verify-venv/bin/python -m pip install --no-cache-dir "vmx==$version"; then
              echo "✓ pip install succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::pip install failed after 5 attempts; PyPI CDN propagation timeout"
              exit 1
            fi
            echo "Attempt $attempt failed (PyPI CDN propagation lag?); waiting 30s..."
            sleep 30
          done
      - name: Smoke test (import + version check + lifecycle round-trip)
        run: |
          set -e
          version="${GITHUB_REF#refs/tags/python-v}"
          .verify-venv/bin/python langs/python/scripts/smoke_test.py "$version"

  python-release-notes:
    # Create a GitHub Release with the matching CHANGELOG section as the
    # body. Runs only after verify-published succeeds, so a GitHub Release
    # exists iff the package is genuinely live and importable on PyPI.
    name: python — GitHub Release
    needs: python-verify-published
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Extract CHANGELOG section
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#python-v}"
          # Extract the `## [VERSION]` section from langs/python/CHANGELOG.md
          # up to (but not including) the next `## [` heading.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' langs/python/CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG section found for version $version in langs/python/CHANGELOG.md" >&2
            exit 1
          fi
          echo "Extracted release notes ($(wc -l < /tmp/release-notes.md) lines):"
          head -20 /tmp/release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#python-v}"
          gh release create "$tag" \
            --title "Python v${version} (PyPI)" \
            --notes-file /tmp/release-notes.md \
            --target "$GITHUB_SHA"

  typescript:
    if: startsWith(github.ref, 'refs/tags/typescript-v')
    runs-on: ubuntu-latest
    environment:
      name: npm-typescript
      url: https://www.npmjs.com/package/@thekaveh/vmx
    permissions:
      contents: read
      id-token: write
    env:
      # The bootstrap token is optional after trusted publishing is configured.
      # Project it only to this discriminator; NODE_AUTH_TOKEN is scoped to the
      # bootstrap publish step below and is absent from the OIDC step.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify tag commit is on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point at commits reachable from origin/main." >&2
            exit 1
          fi
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Install trusted-publishing npm CLI
        run: npm install --global npm@11.5.1
      - name: Verify tag matches package version
        working-directory: langs/typescript
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/typescript-v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package version ($pkg_version)." >&2
            exit 1
          fi
          echo "Tag $tag_version matches package version $pkg_version."
      - name: Install dependencies
        working-directory: langs/typescript
        run: npm ci
      - name: Sync spec fixtures
        working-directory: langs/typescript
        run: npm run sync-fixtures
      - name: Type-check library
        working-directory: langs/typescript
        run: npm run typecheck
      - name: Type-check tests
        working-directory: langs/typescript
        run: npm run typecheck:tests
      - name: Lint
        working-directory: langs/typescript
        run: npm run lint
      - name: Build
        working-directory: langs/typescript
        run: npm run build
      - name: Test
        working-directory: langs/typescript
        run: npm test
      - name: Audit
        working-directory: langs/typescript
        run: npm audit --package-lock-only --audit-level=low
      - name: Check npm package contents
        run: python3 tools/check-typescript-package.py
      - name: Verify packed npm consumer
        run: >-
          python3 tools/smoke-npm-consumer.py
          --package-dir langs/typescript
          --version "${GITHUB_REF#refs/tags/typescript-v}"
      - name: Publish initial package with bootstrap token
        if: env.NPM_TOKEN != ''
        working-directory: langs/typescript
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: npm publish --access public --provenance
      - name: Publish with npm trusted publishing
        if: env.NPM_TOKEN == ''
        working-directory: langs/typescript
        run: npm publish --access public

  typescript-verify-published:
    needs: typescript
    if: startsWith(github.ref, 'refs/tags/typescript-v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22"]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://registry.npmjs.org"
      - name: Poll and verify exact public consumer
        run: >-
          python3 tools/smoke-npm-consumer.py
          --version "${GITHUB_REF#refs/tags/typescript-v}"
          --poll-timeout 600
      - name: Verify npm provenance attestation
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/typescript-v}"
          for attempt in {1..60}; do
            attestations="$(npm view "@thekaveh/vmx@${tag_version}" dist.attestations --json || true)"
            if ATTESTATIONS="$attestations" node -e '
              try {
                const value = JSON.parse(process.env.ATTESTATIONS || "null");
                process.exit(value?.url && value?.provenance?.predicateType ? 0 : 1);
              } catch {
                process.exit(1);
              }
            '; then
              echo "$attestations"
              exit 0
            fi
            echo "Waiting for npm provenance attestation (attempt ${attempt}/60)..."
            sleep 10
          done
          echo "::error::npm package has no provenance attestation after 600 seconds." >&2
          exit 1

  typescript-release-notes:
    needs: typescript-verify-published
    if: startsWith(github.ref, 'refs/tags/typescript-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Extract TypeScript release notes
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/typescript-v}"
          awk -v v="$tag_version" '
            $0 ~ "^## \\[" v "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' langs/typescript/CHANGELOG.md > /tmp/typescript-release-notes.md
          if [ ! -s /tmp/typescript-release-notes.md ]; then
            echo "::error::No TypeScript CHANGELOG section found for ${tag_version}." >&2
            exit 1
          fi
      - name: Create TypeScript GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#typescript-v}"
          gh release create "$tag" \
            --title "TypeScript v${version} (npm)" \
            --notes-file /tmp/typescript-release-notes.md \
            --target "$GITHUB_SHA"

  swift:
    # The Swift flavor has no central registry (no NuGet/PyPI/npm analog —
    # SwiftPM consumes packages directly from git URLs). The release here just
    # cuts a GitHub Release pointing at the tag so SwiftPM consumers get a
    # stable artifact reference. `swift.yml` only triggers on path-push /
    # pull_request, NOT on tag-push, so this job must run its own test gate
    # before creating the release (VMX-038).
    if: startsWith(github.ref, 'refs/tags/swift-v')
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify tag commit is on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Release tags must point at commits reachable from origin/main." >&2
            exit 1
          fi
      - name: Verify semantic and operational tags
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/swift-v}"
          declared_version="$(sed -nE 's/^[[:space:]]*public static let current = "([^"]+)".*/\1/p' langs/swift/Sources/VMx/Version.swift)"
          if [ "$declared_version" != "$tag_version" ]; then
            echo "::error::swift-v${tag_version} does not match VMxVersion.current ${declared_version}." >&2
            exit 1
          fi
          git fetch --force origin "refs/tags/v${tag_version}:refs/tags/v${tag_version}"
          semantic_sha="$(git rev-parse "refs/tags/v${tag_version}^{commit}")"
          if [ "$semantic_sha" != "$GITHUB_SHA" ]; then
            echo "::error::v${tag_version} points at ${semantic_sha}, not operational tag commit ${GITHUB_SHA}." >&2
            exit 1
          fi
          echo "v${tag_version}, swift-v${tag_version}, and VMxVersion.current agree."
      - name: Check root and nested manifest parity
        run: python3 tools/check-swift-package-sync.py
      - name: Build & test root package
        # swift test requires full Xcode (XCTest); macos-latest provides it.
        # Combine is macOS-only so ubuntu-latest cannot run these tests.
        run: swift build -c release && swift test --parallel
      - name: Build & test nested package
        working-directory: langs/swift
        run: swift build -c release && swift test --parallel
      - name: Verify fresh public SwiftPM consumer
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/swift-v}"
          python3 tools/smoke-swiftpm-consumer.py \
            --url https://github.com/thekaveh/VMx.git \
            --version "$tag_version"
      - name: Extract Swift release notes
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/swift-v}"
          awk -v v="$tag_version" '
            $0 ~ "^## \\[" v "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' langs/swift/CHANGELOG.md > /tmp/swift-release-notes.md
          if [ ! -s /tmp/swift-release-notes.md ]; then
            echo "::error::No Swift CHANGELOG section found for ${tag_version}." >&2
            exit 1
          fi
          echo "Extracted Swift release notes ($(wc -l < /tmp/swift-release-notes.md) lines)."
      - name: Create GitHub Release for SwiftPM consumers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#swift-v}"
          # Static release notes pointing at the CHANGELOG entry (deliberately
          # not `--generate-notes`, which would depend on prior-release history).
          gh release create "$tag" \
            --title "Swift v${version} (SwiftPM)" \
            --notes-file /tmp/swift-release-notes.md \
            --target "$GITHUB_SHA"
