name: release

on:
  push:
    tags:
      - "csharp-v*"
      - "python-v*"
      - "typescript-v*"

jobs:
  csharp:
    if: startsWith(github.ref, 'refs/tags/csharp-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          cache: true
          cache-dependency-path: langs/csharp/**/packages.lock.json
      - name: Pack
        run: dotnet pack langs/csharp/VMx.sln -c Release --nologo -o /tmp/nupkgs
      - name: Push to NuGet
        if: env.NUGET_API_KEY != ''
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push /tmp/nupkgs/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  python:
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Build sdist + wheel
        run: uv build --project langs/python --out-dir dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  typescript:
    if: startsWith(github.ref, 'refs/tags/typescript-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: langs/typescript/package-lock.json
      - name: Install
        working-directory: langs/typescript
        run: npm ci
      - name: Build
        working-directory: langs/typescript
        run: npm run build
      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        working-directory: langs/typescript
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
