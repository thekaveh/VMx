name: release

on:
  push:
    tags:
      - "csharp-v*"
      - "python-v*"
      - "typescript-v*"
      - "swift-v*"
  # No workflow_dispatch: every job gates on `startsWith(github.ref,
  # 'refs/tags/…')`, so a manual dispatch from a branch silently did nothing.
  # Releases are tag-driven only; re-add dispatch only together with
  # ref-resolution logic in the jobs.

# Serialise per-tag publish runs. `cancel-in-progress: false` because once
# a PyPI upload is in flight the artifact is permanent (yank-not-delete);
# we'd rather let the in-flight run finish than abort it mid-step. The
# group is keyed on the tag ref, so independent flavors' tags
# (e.g. python-v2.6.0 vs typescript-v2.6.0) run concurrently as intended.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  csharp:
    if: startsWith(github.ref, 'refs/tags/csharp-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Hoisted to job-level so the step-level `if: env.NUGET_API_KEY != ''`
      # actually sees a value. GitHub evaluates step `if:` against
      # workflow/job env BEFORE applying step-level `env:`, so a step-local
      # env mapping is invisible to the same step's `if:`. Secrets cannot
      # be referenced directly in `if:` either — the documented workaround
      # is to project secret into job env.
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
          cache: true
          cache-dependency-path: langs/csharp/**/packages.lock.json
      - name: Pack
        run: dotnet pack langs/csharp/VMx.sln -c Release --nologo -o /tmp/nupkgs
      - name: Push to NuGet
        if: env.NUGET_API_KEY != ''
        run: |
          dotnet nuget push /tmp/nupkgs/*.nupkg \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  python-test:
    # Gate: full test matrix before letting the publish job run. Without
    # this, a tag push on a red branch would still publish to PyPI
    # (versions can be yanked but not deleted — a poisoned release is
    # permanent). The matrix mirrors `python.yml`'s pull-request gate on
    # the `python-version` dimension (3.10..3.13); the OS dimension is
    # restricted to `ubuntu-latest` because release artifacts are pure-
    # Python (`py3-none-any` wheel) and the PR gate already exercises
    # macOS + Windows on every push to main.
    name: python — test before release
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          cache-dependency-glob: |
            langs/python/pyproject.toml
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        working-directory: langs/python
        run: uv sync --all-extras
      - name: Ruff lint
        working-directory: langs/python
        run: uv run ruff check src tests
      - name: Ruff format check
        working-directory: langs/python
        run: uv run ruff format --check src tests
      - name: mypy --strict
        working-directory: langs/python
        run: uv run mypy --strict src/vmx
      - name: pytest
        working-directory: langs/python
        run: uv run pytest

  python-build-and-publish:
    # OIDC-based PyPI trusted publishing — no API token in repo secrets.
    # The PyPI project `vmx` is configured with a Trusted Publisher pointing
    # to this repo + workflow + environment `pypi-python`. The environment
    # has a required-reviewer rule (see langs/python/RELEASING.md §1.2), so
    # the publish job pauses for approval before any irreversible PyPI
    # upload.
    name: python — build & publish
    needs: python-test
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi-python
      url: https://pypi.org/p/vmx
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "0.11.19"
          enable-cache: true
          # VMx is a library project — uv.lock is gitignored (matches
          # python.yml's cache-key derivation). Override the default
          # `**/uv.lock` glob so setup-uv doesn't error out searching for
          # a lockfile we deliberately don't track.
          cache-dependency-glob: |
            langs/python/pyproject.toml
      - name: Set up Python
        run: uv python install 3.12

      - name: Verify tag matches package version
        # PyPI uploads are permanent (yank-not-delete), so a typo'd tag
        # (python-v2.6.1 against a 2.6.0 __about__.py) MUST abort before
        # publish. verify-published would only catch it after the
        # irreversible upload.
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/python-v}"
          pkg_version=$(uv run --project langs/python python -c \
            "from vmx.__about__ import __version__; print(__version__)")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package version ($pkg_version). Bump langs/python/src/vmx/__about__.py before tagging." >&2
            exit 1
          fi
          echo "Tag $tag_version matches package version $pkg_version."

      # NOTE: build wheel and sdist as separate `uv build` invocations.
      # A single `uv build` defaults to "sdist first, then wheel-from-sdist"
      # which fails because pyproject.toml's `force-include` points outside
      # the project tree (../../spec/fixtures/lifecycle-transitions.json),
      # and the sdist (correctly) omits files outside its root. Building
      # each artifact from the live source tree sidesteps that.
      - name: Build wheel
        run: uv build --project langs/python --wheel --out-dir dist
      - name: Build sdist
        run: uv build --project langs/python --sdist --out-dir dist

      - name: Twine check
        # Catches common metadata issues (missing long_description, invalid
        # RST/MD, malformed classifiers) before uploading. Cheap pre-flight.
        run: |
          set -euo pipefail
          uv tool run --from twine twine check dist/*

      - name: Publish to PyPI
        # Sigstore attestations (`attestations: true`, PEP 740) ship signed
        # provenance alongside the sdist and wheel.
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist/
          attestations: true

  python-verify-published:
    # Install the just-published release in a clean venv and import-check
    # it. PyPI's CDN can lag tens of seconds after a successful upload, so
    # retry up to 5 times with 30s backoff. Each attempt starts from a
    # fresh venv to ensure a partial install on attempt N can't mask the
    # regression on attempt N+1. No pip cache — fresh resolution catches
    # PyPI propagation lag honestly.
    name: python — verify published
    needs: python-build-and-publish
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Wait for PyPI CDN + install in fresh venv
        run: |
          set -e
          version="${GITHUB_REF#refs/tags/python-v}"
          for attempt in 1 2 3 4 5; do
            rm -rf .verify-venv
            python -m venv .verify-venv
            if .verify-venv/bin/python -m pip install --no-cache-dir "vmx==$version"; then
              echo "✓ pip install succeeded on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::pip install failed after 5 attempts; PyPI CDN propagation timeout"
              exit 1
            fi
            echo "Attempt $attempt failed (PyPI CDN propagation lag?); waiting 30s..."
            sleep 30
          done
      - name: Smoke test (import + version check + lifecycle round-trip)
        run: |
          set -e
          version="${GITHUB_REF#refs/tags/python-v}"
          .verify-venv/bin/python langs/python/scripts/smoke_test.py "$version"

  python-release-notes:
    # Create a GitHub Release with the matching CHANGELOG section as the
    # body. Runs only after verify-published succeeds, so a GitHub Release
    # exists iff the package is genuinely live and importable on PyPI.
    name: python — GitHub Release
    needs: python-verify-published
    if: startsWith(github.ref, 'refs/tags/python-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract CHANGELOG section
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#python-v}"
          # Extract the `## [VERSION]` section from langs/python/CHANGELOG.md
          # up to (but not including) the next `## [` heading.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' langs/python/CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG section found for version $version in langs/python/CHANGELOG.md" >&2
            exit 1
          fi
          echo "Extracted release notes ($(wc -l < /tmp/release-notes.md) lines):"
          head -20 /tmp/release-notes.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#python-v}"
          gh release create "$tag" \
            --title "Python v${version} (PyPI)" \
            --notes-file /tmp/release-notes.md \
            --target "$GITHUB_SHA"

  typescript:
    if: startsWith(github.ref, 'refs/tags/typescript-v')
    runs-on: ubuntu-latest
    permissions:
      # Token-based npm publish: only contents:read is needed. When the TS
      # release migrates to npm provenance via OIDC (would also need
      # `provenance: true` on `npm publish`), restore `id-token: write`.
      contents: read
    env:
      # See the rationale on the csharp job's env block — secrets must be
      # projected to job-level env so that step `if:` can read them.
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: langs/typescript/package-lock.json
      - name: Install
        working-directory: langs/typescript
        run: npm ci
      - name: Build
        working-directory: langs/typescript
        run: npm run build
      - name: Publish to npm
        if: env.NPM_TOKEN != ''
        working-directory: langs/typescript
        run: npm publish --access public

  swift:
    # The Swift flavor has no central registry (no NuGet/PyPI/npm analog —
    # SwiftPM consumes packages directly from git URLs). The release here just
    # cuts a GitHub Release pointing at the tag so SwiftPM consumers get a
    # stable artifact reference. Building / testing the package is the job
    # of `.github/workflows/swift.yml`; this workflow trusts that gate.
    if: startsWith(github.ref, 'refs/tags/swift-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release for SwiftPM consumers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#swift-v}"
          # `--generate-notes` falls back gracefully when there's no prior
          # release on the same tag prefix.
          gh release create "$tag" \
            --title "Swift v${version} (SwiftPM)" \
            --notes "VMx Swift flavor — see \`langs/swift/CHANGELOG.md\` for the entry." \
            --target "$GITHUB_SHA"
