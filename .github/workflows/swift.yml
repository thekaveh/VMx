name: swift

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "Package.swift"
      - "langs/swift/**"
      - "examples/swift/**"
      - "spec/**"
      - "tools/check-swift-package-sync.py"
      - ".github/workflows/swift.yml"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    name: build & test (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Swift Combine is currently macOS / iOS / tvOS / watchOS only;
        # Linux Swift drops Combine, so the Swift VMx flavor is macOS-only
        # for now. A Combine-shim layer (or migration to swift-async-algorithms)
        # would re-enable ubuntu-latest in a follow-up PR.
        include:
          - os: macos-15
            label: default-xcode
            xcode: default
          - os: macos-15
            label: oldest-hosted-xcode
            xcode: /Applications/Xcode_16.0.app
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Select oldest hosted Xcode
        if: matrix.xcode != 'default'
        run: sudo xcode-select --switch "${{ matrix.xcode }}/Contents/Developer"
      - name: Show Swift version
        run: swift --version
      - name: Verify oldest hosted compiler
        if: matrix.xcode != 'default'
        # `swift --version` prints `Apple Swift version 6.0 (swiftlang-…)`, so the
        # minor must be allowed to end at a space (build metadata) as well as a
        # patch dot or end-of-line; the space case regressed when the oldest
        # hosted Xcode began reporting a bare `6.0`.
        run: swift --version | grep -E '^(Apple )?Swift version 6\.0(\.| |$)'
      - name: Check root and nested manifest parity
        run: python3 tools/check-swift-package-sync.py
      - name: Build root package
        run: swift build -c release
      - name: Enforce strict concurrency boundaries
        if: matrix.xcode == 'default'
        run: >-
          swift build -c release
          -Xswiftc -strict-concurrency=complete
          -Xswiftc -warn-concurrency
          -Xswiftc -warnings-as-errors
      - name: Test root package
        run: swift test --parallel
      - name: Build nested package
        working-directory: langs/swift
        run: swift build -c release
      - name: Test nested package
        working-directory: langs/swift
        run: swift test --parallel

  platforms:
    name: build (${{ matrix.label }})
    runs-on: macos-15
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: iOS 16
            destination: "generic/platform=iOS"
          - label: tvOS 16
            destination: "generic/platform=tvOS"
          - label: watchOS 9
            destination: "generic/platform=watchOS"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build root package for ${{ matrix.label }}
        run: >-
          xcodebuild -scheme VMx
          -destination "${{ matrix.destination }}"
          -configuration Release
          CODE_SIGNING_ALLOWED=NO build

  examples:
    name: examples (notes-showcase)
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Show Swift version
        run: swift --version
      # The flagship example is a separate SwiftPM package depending on the
      # in-repo VMx library via `.package(path:)`. SwiftUI/Combine require macOS,
      # so the example (build + the conformance/scenario XCTests) runs here only.
      - name: Build NotesShowcase flagship
        working-directory: examples/swift/notes-showcase
        run: swift build
      - name: Enforce NotesShowcase strict concurrency
        working-directory: examples/swift/notes-showcase
        run: >-
          swift build -c release
          -Xswiftc -strict-concurrency=complete
          -Xswiftc -warn-concurrency
          -Xswiftc -warnings-as-errors
      - name: Test NotesShowcase flagship
        working-directory: examples/swift/notes-showcase
        # Parallel XCTest emits each case name before execution, making any
        # future stuck async scenario immediately attributable in CI logs.
        run: swift test --parallel

  required:
    name: "required: swift"
    if: always()
    needs: [build, platforms, examples]
    runs-on: ubuntu-latest
    steps:
      - name: Require every Swift job
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq -e 'to_entries | all(.value.result == "success")' <<<"$RESULTS"
