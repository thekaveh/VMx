name: swift

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "langs/swift/**"
      - "examples/swift/**"
      - "spec/**"
      - ".github/workflows/swift.yml"
  pull_request:
    paths:
      - "langs/swift/**"
      - "examples/swift/**"
      - "spec/**"
      - ".github/workflows/swift.yml"
  workflow_dispatch:

jobs:
  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Swift Combine is currently macOS / iOS / tvOS / watchOS only;
        # Linux Swift drops Combine, so the Swift VMx flavor is macOS-only
        # for now. A Combine-shim layer (or migration to swift-async-algorithms)
        # would re-enable ubuntu-latest in a follow-up PR.
        os: [macos-latest]
    steps:
      - uses: actions/checkout@v4
      # Toolchain policy: latest-only — the job builds with whatever Swift the
      # current macos-latest image ships (displayed below for forensics). The
      # Package.swift floor (swift-tools-version 5.9) is declared but not
      # exercised by a dedicated matrix cell; if a contributor reports a 5.9
      # breakage, add a pinned-Xcode cell rather than silently raising the floor.
      - name: Show Swift version
        run: swift --version
      - name: Build
        working-directory: langs/swift
        run: swift build -c release
      - name: Test
        working-directory: langs/swift
        run: swift test --parallel

  examples:
    name: examples (notes-showcase)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      # The flagship example is a separate SwiftPM package depending on the
      # in-repo VMx library via `.package(path:)`. SwiftUI/Combine require macOS,
      # so the example (build + the conformance/scenario XCTests) runs here only.
      - name: Build NotesShowcase flagship
        working-directory: examples/swift/notes-showcase
        run: swift build
      - name: Test NotesShowcase flagship
        working-directory: examples/swift/notes-showcase
        run: swift test
