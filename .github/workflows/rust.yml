name: rust

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "langs/rust/**"
      - "examples/rust/**"
      - "spec/**"
      - ".github/workflows/rust.yml"
      - "tools/check-rust-package.py"
      - "tools/smoke-rust-consumer.py"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  audit:
    name: dependency advisory audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.2 --locked

      - name: Deny vulnerabilities and advisory warnings
        run: |
          cargo audit --file langs/rust/Cargo.lock --deny warnings
          cargo audit --file examples/rust/console/hello-vmx/Cargo.lock --deny warnings
          cargo audit --file examples/rust/tui/notes-showcase/Cargo.lock --deny warnings

  build:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Format check
        run: cargo fmt --manifest-path langs/rust/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --locked --manifest-path langs/rust/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked --manifest-path langs/rust/Cargo.toml

  examples:
    name: examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          toolchain: stable

      - name: Run hello-vmx example
        run: cargo run --locked --manifest-path examples/rust/console/hello-vmx/Cargo.toml

      - name: Test notes-showcase TUI example
        run: cargo test --locked --manifest-path examples/rust/tui/notes-showcase/Cargo.toml

      - name: Smoke notes-showcase TUI example
        run: cargo run --locked --manifest-path examples/rust/tui/notes-showcase/Cargo.toml -- --smoke

  package:
    name: package (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: ["1.88.0", "stable"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust ${{ matrix.toolchain }}
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          toolchain: ${{ matrix.toolchain }}

      - name: Package crate
        run: cargo package --locked --manifest-path langs/rust/Cargo.toml

      - name: Check package contents
        run: python3 tools/check-rust-package.py

      - name: Verify packaged consumer
        run: |
          set -euo pipefail
          version="$(sed -nE 's/^version = "([^"]+)"/\1/p' langs/rust/Cargo.toml)"
          python3 tools/smoke-rust-consumer.py \
            --package-dir langs/rust \
            --version "$version"

  required:
    name: "required: rust"
    if: always()
    needs: [audit, build, examples, package]
    runs-on: ubuntu-latest
    steps:
      - name: Require every Rust job
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq -e 'to_entries | all(.value.result == "success")' <<<"$RESULTS"
