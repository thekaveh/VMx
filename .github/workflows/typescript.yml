name: typescript

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "langs/typescript/**"
      - "examples/typescript/**"
      - "spec/**"
      - "tools/check-typescript-package.py"
      - "tools/smoke-npm-consumer.py"
      - ".github/workflows/typescript.yml"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

defaults:
  run:
    working-directory: langs/typescript

jobs:
  build:
    name: build & test (${{ matrix.os }} / node${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Keep the declared Node 20 compatibility floor covered even though it
        # is EOL, and also cover every current supported even-numbered line.
        node-version: ["20", "22", "24", "26"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: langs/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --package-lock-only --audit-level=low

      - name: Sync spec fixtures
        run: npm run sync-fixtures

      - name: Type-check
        run: npm run typecheck

      - name: Type-check tests
        run: npm run typecheck:tests

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        # On the matrix combination that uploads coverage, run with --coverage
        # so coverage-final.json is generated for codecov. Coverage runs on
        # Node 26 (the highest pinned node in the matrix).
        run: ${{ (matrix.os == 'ubuntu-latest' && matrix.node-version == '26') && 'npm run coverage' || 'npm test' }}

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '26'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: langs/typescript/coverage/coverage-final.json
          flags: typescript
          fail_ci_if_error: false

  package:
    name: package (node${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["20", "22", "24", "26"]
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: langs/typescript/package-lock.json

      - name: Install package dependencies
        run: npm ci --prefix langs/typescript

      - name: Check npm package contents
        run: python3 tools/check-typescript-package.py

      - name: Verify packed npm consumer
        run: |
          set -euo pipefail
          package_version=$(node -p 'require("./langs/typescript/package.json").version')
          python3 tools/smoke-npm-consumer.py \
            --package-dir langs/typescript \
            --version "$package_version"

  examples:
    # Installs + tests the Notes-Showcase React example (Phase 8 of the
    # notes-showcase plan). Kept as a separate job because the existing
    # `build` job pins `defaults.run.working-directory: langs/typescript` and
    # runs a 3-OS × 4-node matrix; the example only needs a single combo to
    # confirm the showcase package builds against the workspace-local `vmx`
    # (file:../../../../langs/typescript in package.json).
    name: examples (notes-showcase)
    runs-on: ubuntu-latest
    # Override workflow-level `defaults.run.working-directory: langs/typescript`
    # so `npm --prefix examples/...` resolves from the repo root.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: |
            examples/typescript/console/hello-vmx/package-lock.json
            examples/typescript/react/notes-showcase/package-lock.json

      - name: Install vmx lib deps + build dist
        # The notes-showcase imports `vmx` via `file:../../../../langs/typescript`
        # in its package.json. npm pack runs the lib's `prepack` script during
        # the file: install, but that script needs vmx's own devDeps (tsup,
        # etc.) to be present. Install + build the lib first so the file: dep
        # snapshot has dist/ artifacts that match the exports map (./dist/*).
        # Without this step, vitest fails with `Failed to resolve entry for
        # package "vmx"` because dist/ is absent in the packed snapshot.
        working-directory: langs/typescript
        run: |
          npm ci
          npm run build

      - name: console example install
        run: npm ci --prefix examples/typescript/console/hello-vmx

      - name: console example type-check
        run: npm run typecheck --prefix examples/typescript/console/hello-vmx

      - name: console example smoke
        run: npm start --prefix examples/typescript/console/hello-vmx

      - name: notes-showcase install
        # `npm ci` requires a checked-in package-lock.json — committed under
        # examples/typescript/react/notes-showcase/ (audit round 3 Critical-3:
        # the prior .gitignore entry hid it from the repo, silently disabling
        # the actions/setup-node cache above). No `npm install` fallback: a
        # drifted lockfile must fail loudly, not silently install unpinned.
        run: npm ci --prefix examples/typescript/react/notes-showcase

      - name: notes-showcase audit
        run: npm audit --prefix examples/typescript/react/notes-showcase --package-lock-only --audit-level=moderate

      - name: notes-showcase test
        run: npm test --prefix examples/typescript/react/notes-showcase

      - name: notes-showcase type-check
        run: npm run typecheck --prefix examples/typescript/react/notes-showcase

      - name: notes-showcase lint
        # Includes the Pure-VM import and hub-subscription restrictions for
        # view components as well as the project's complete lint surface.
        run: npm run lint --prefix examples/typescript/react/notes-showcase

      - name: notes-showcase production build
        run: npm run build --prefix examples/typescript/react/notes-showcase

  required:
    name: "required: typescript"
    if: always()
    needs: [build, package, examples]
    runs-on: ubuntu-latest
    # This aggregator job has no checkout, so override the workflow-level
    # `defaults.run.working-directory: langs/typescript` (which would not exist
    # here) back to the workspace root so the jq gate can start.
    defaults:
      run:
        working-directory: .
    steps:
      - name: Require every TypeScript job
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq -e 'to_entries | all(.value.result == "success")' <<<"$RESULTS"
