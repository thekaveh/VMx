name: typescript

on:
  push:
    branches: [main]
    paths:
      - "langs/typescript/**"
      - "spec/**"
      - ".github/workflows/typescript.yml"
  pull_request:
    paths:
      - "langs/typescript/**"
      - "spec/**"
      - ".github/workflows/typescript.yml"

defaults:
  run:
    working-directory: langs/typescript

jobs:
  build:
    name: build & test (${{ matrix.os }} / node${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: langs/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync spec fixtures
        run: npm run sync-fixtures

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        # On the matrix combination that uploads coverage, run with --coverage
        # so coverage-final.json is generated for codecov.
        run: ${{ (matrix.os == 'ubuntu-latest' && matrix.node-version == '22') && 'npm run coverage' || 'npm test' }}

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        uses: codecov/codecov-action@v4
        with:
          files: langs/typescript/coverage/coverage-final.json
          flags: typescript
          fail_ci_if_error: false
