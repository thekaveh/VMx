name: typescript

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "langs/typescript/**"
      - "examples/typescript/**"
      - "spec/**"
      - ".github/workflows/typescript.yml"
  pull_request:
    paths:
      - "langs/typescript/**"
      - "examples/typescript/**"
      - "spec/**"
      - ".github/workflows/typescript.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: langs/typescript

jobs:
  build:
    name: build & test (${{ matrix.os }} / node${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # 20 = engines floor declared in package.json (raised from 18 because
        # vitest 4 / vite 6 require Node >= 20.0.0; the prior Node 18 cell
        # broke after the GHSA-5xrq-8626-4rwp closure bumped both). 22 is
        # the next active LTS line.
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: langs/typescript/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --package-lock-only --audit-level=low

      - name: Sync spec fixtures
        run: npm run sync-fixtures

      - name: Type-check
        run: npm run typecheck

      - name: Type-check tests
        run: npm run typecheck:tests

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        # On the matrix combination that uploads coverage, run with --coverage
        # so coverage-final.json is generated for codecov. Coverage runs on
        # Node 22 (the highest pinned node in the matrix).
        run: ${{ (matrix.os == 'ubuntu-latest' && matrix.node-version == '22') && 'npm run coverage' || 'npm test' }}

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '22'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        with:
          files: langs/typescript/coverage/coverage-final.json
          flags: typescript
          fail_ci_if_error: false

  examples:
    # Installs + tests the Notes-Showcase React example (Phase 8 of the
    # notes-showcase plan). Kept as a separate job because the existing
    # `build` job pins `defaults.run.working-directory: langs/typescript` and
    # runs a 3-OS × 3-node matrix; the example only needs a single combo to
    # confirm the showcase package builds against the workspace-local `vmx`
    # (file:../../../../langs/typescript in package.json).
    name: examples (notes-showcase)
    runs-on: ubuntu-latest
    # Override workflow-level `defaults.run.working-directory: langs/typescript`
    # so `npm --prefix examples/...` resolves from the repo root.
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            examples/typescript/console/hello-vmx/package-lock.json
            examples/typescript/react/notes-showcase/package-lock.json

      - name: Install vmx lib deps + build dist
        # The notes-showcase imports `vmx` via `file:../../../../langs/typescript`
        # in its package.json. npm pack runs the lib's `prepack` script during
        # the file: install, but that script needs vmx's own devDeps (tsup,
        # etc.) to be present. Install + build the lib first so the file: dep
        # snapshot has dist/ artifacts that match the exports map (./dist/*).
        # Without this step, vitest fails with `Failed to resolve entry for
        # package "vmx"` because dist/ is absent in the packed snapshot.
        working-directory: langs/typescript
        run: |
          npm ci
          npm run build

      - name: console example install
        run: npm ci --prefix examples/typescript/console/hello-vmx

      - name: console example type-check
        run: npm run typecheck --prefix examples/typescript/console/hello-vmx

      - name: console example smoke
        run: npm start --prefix examples/typescript/console/hello-vmx

      - name: notes-showcase install
        # `npm ci` requires a checked-in package-lock.json — committed under
        # examples/typescript/react/notes-showcase/ (audit round 3 Critical-3:
        # the prior .gitignore entry hid it from the repo, silently disabling
        # the actions/setup-node cache above). No `npm install` fallback: a
        # drifted lockfile must fail loudly, not silently install unpinned.
        run: npm ci --prefix examples/typescript/react/notes-showcase

      - name: notes-showcase audit
        run: npm audit --prefix examples/typescript/react/notes-showcase --package-lock-only --audit-level=moderate

      - name: notes-showcase test
        run: npm test --prefix examples/typescript/react/notes-showcase

      - name: notes-showcase ESLint Pure-VM check
        # Pure-VM contract: view components must not import from
        # `models/` / `viewmodels/` or subscribe to hub messages. The
        # ESLint config under examples/typescript/react/notes-showcase/
        # encodes the rules; running it as a dedicated step surfaces
        # violations distinctly from generic test failures.
        run: cd examples/typescript/react/notes-showcase && npx eslint src/views/components
