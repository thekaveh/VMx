name: conformance

on:
  push:
    branches: [main]
    paths:
      - "spec/**"
      - "langs/**/tests/conformance/**"
      - "langs/csharp/tests/VMx.Conformance.Tests/**"
      - "tools/check-conformance-coverage.py"
      - "tools/tests/**"
      - ".github/workflows/conformance.yml"
  pull_request:
    paths:
      - "spec/**"
      - "langs/**/tests/conformance/**"
      - "langs/csharp/tests/VMx.Conformance.Tests/**"
      - "tools/check-conformance-coverage.py"
      - "tools/tests/**"
      - ".github/workflows/conformance.yml"

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Python dependencies (for pytest)
        run: uv --project langs/python sync --all-extras

      - name: Run tool's own unit tests
        run: uv --project langs/python run pytest tools/tests/ -v

      - name: Enforce conformance coverage (csharp + python)
        # Both C# v1.0.0 and Python v1.0.0 have shipped. CI now enforces 100%
        # conformance coverage for both languages. The tool exits non-zero if
        # any required language falls below full coverage.
        run: uv --project langs/python run python tools/check-conformance-coverage.py --require csharp --require python
