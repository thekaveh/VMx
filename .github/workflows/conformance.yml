name: conformance

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
    paths:
      - "spec/**"
      - "docs/**"
      - "langs/**/tests/conformance/**"
      - "langs/csharp/tests/VMx.Conformance.Tests/**"
      - "langs/swift/Tests/VMxTests/**"
      - "langs/rust/src/fixtures/**"
      - "langs/python/src/vmx/lifecycle/_data/**"
      - "langs/swift/Sources/VMx/Resources/**"
      - "langs/python/pyproject.toml"
      - "tools/**"
      - ".pre-commit-config.yaml"
      - ".github/dependabot.yml"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  coverage:
    name: "required: conformance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # check-version-consistency.py reconciles the compatibility matrix
          # against git tags; the default shallow checkout fetches no tags, so
          # every released version would read as MISSING. Fetch all tags.
          fetch-tags: true
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.28"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync Python dependencies (for pytest)
        run: uv --project langs/python sync --locked --all-extras

      - name: Ruff lint tools/
        # The conformance-coverage tool lives at the repo root (outside the
        # langs/python lint scope) but is CI-critical; lint it here so style
        # regressions in this script don't slip past every other workflow.
        # `--config` is required because ruff auto-discovery starts at the
        # invocation CWD (repo root), never finds langs/python/pyproject.toml,
        # and silently falls back to defaults instead of our chosen rules.
        run: uv --project langs/python run ruff check --config langs/python/pyproject.toml tools/
        # Also enforce formatting so style regressions in this script can't
        # slip past CI silently.
      - name: Ruff format check tools/
        # Parity with the lint step above — format-check tools/ with the same
        # langs/python config (otherwise ruff falls back to defaults which use
        # a different line-length and disagree with the format committed here).
        run: uv --project langs/python run ruff format --check --config langs/python/pyproject.toml tools/

      - name: Run tool's own unit tests
        run: uv --project langs/python run pytest tools/tests/ -v

      - name: Check version consistency
        # Verifies that spec/VERSION, all flavor manifests, and compatibility-matrix.md
        # are mutually consistent, and that every matrix-row version has a matching
        # git tag (pre-v2.0 rows are informational-only; the tool exits 0).
        run: uv --project langs/python run python tools/check-version-consistency.py

      - name: Check workflow pin inventory
        run: uv --project langs/python run python tools/check-workflow-pins.py

      - name: Check Python fixture sync
        run: uv --project langs/python run python tools/check-python-fixture-sync.py

      - name: Check Rust fixture sync
        run: uv --project langs/python run python tools/check-rust-fixture-sync.py

      - name: mdformat check (spec/ + docs/)
        # CI backstop for the pre-commit mdformat hook — contributors without
        # hooks installed could otherwise land mis-formatted markdown. Pinned
        # to the same 0.7.x + pinned plugins as .pre-commit-config.yaml.
        # Tracked files only, matching the
        # hook's ^(spec|docs)/.*\.md$ scope.
        # Git pathspec `*` crosses directory separators, so these two globs
        # cover top-level AND nested files; `**/*.md` would MISS top-level
        # ones (verified: spec/**/*.md matches 41 of 64).
        run: |
          git ls-files 'spec/*.md' 'docs/*.md' \
            | grep -Ev '^(docs/content/installation\.md|docs/content/getting-started/index\.md|docs/content/examples/rust-tui-notes-showcase\.md|docs/content/flavors/rust\.md|docs/content/primitives/(command-families|services-messages-dispatching)\.md|docs/content/primitives/viewmodel-families/(composite-family|forwarding-wrapper-family|hierarchical-family)\.md|docs/content/primitives/viewmodel-families/specialized/(confirmation-vm|discriminator-vm|form-vm|modal-vm|notification-vm)\.md)$' \
            | xargs uv --project langs/python run \
                --with "mdformat==0.7.22" --with "mdformat-gfm==1.0.0" --with "mdformat-tables==1.0.0" \
                mdformat --check

      - name: Enforce conformance coverage (csharp + python + typescript + swift + rust)
        # All five flavors ship at the current spec version and are enforced at
        # 100% coverage of the full 395-ID library catalog. Swift and Rust use
        # doc-comment markers attached to real test functions, so this coverage
        # check does not need either toolchain. The tool exits non-zero if any
        # required language falls below full catalog coverage.
        run: uv --project langs/python run python tools/check-conformance-coverage.py --require csharp --require python --require typescript --require swift --require rust

      - name: Check Swift fixture sync
        run: uv --project langs/python run python tools/check-swift-fixture-sync.py
