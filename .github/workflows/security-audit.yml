name: security-audit

permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

jobs:
  codeql:
    name: "CodeQL (${{ matrix.language }})"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: none
            runner: ubuntu-latest
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: python
            build-mode: none
            runner: ubuntu-latest
          - language: rust
            build-mode: none
            runner: ubuntu-latest
          - language: swift
            build-mode: manual
            runner: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      - name: Build Swift packages
        if: matrix.language == 'swift'
        run: |
          swift build -c release --package-path langs/swift
          swift build -c release --package-path examples/swift/notes-showcase
      - name: Analyze
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          category: "/language:${{ matrix.language }}"

  npm:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - langs/typescript
          - examples/typescript/console/hello-vmx
          - examples/typescript/react/notes-showcase
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
      - run: npm audit --prefix "${{ matrix.project }}" --package-lock-only --audit-level=low

  cargo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable 2026-07-16
        with:
          toolchain: stable
      - run: cargo install cargo-audit --version 0.22.2 --locked
      - name: Audit every committed Cargo lock
        run: |
          cargo audit --file langs/rust/Cargo.lock --deny warnings
          cargo audit --file examples/rust/console/hello-vmx/Cargo.lock --deny warnings
          cargo audit --file examples/rust/tui/notes-showcase/Cargo.lock --deny warnings

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - langs/python
          - examples/python
          - examples/python/textual/inspector
          - examples/python/textual/notes_showcase
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.28"
      - run: uv export --project . --locked --no-dev --no-emit-project --no-emit-local --output-file /tmp/runtime.txt
        working-directory: ${{ matrix.project }}
      - run: uvx --from pip-audit==2.10.1 pip-audit --requirement /tmp/runtime.txt
        working-directory: ${{ matrix.project }}

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m venv /tmp/vmx-docs-audit
      - run: /tmp/vmx-docs-audit/bin/pip install --require-hashes -r docs/requirements.txt
      - run: /tmp/vmx-docs-audit/bin/python -m pip_audit --local

  nuget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x
      - run: >
          dotnet restore langs/csharp/VMx.sln --locked-mode
          -p:NuGetAudit=true -p:NuGetAuditMode=all -p:NuGetAuditLevel=low
          "-warnaserror:NU1901;NU1902;NU1903;NU1904"
      - run: >
          dotnet restore examples/csharp/Examples.sln -p:EnableWindowsTargeting=true
          -p:NuGetAudit=true -p:NuGetAuditMode=all -p:NuGetAuditLevel=low
          "-warnaserror:NU1901;NU1902;NU1903;NU1904"

  required:
    name: "required: security"
    if: always()
    needs: [codeql, npm, cargo, python, docs, nuget]
    runs-on: ubuntu-latest
    steps:
      - name: Require code scanning and every dependency audit
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: jq -e 'to_entries | all(.value.result == "success")' <<<"$RESULTS"
