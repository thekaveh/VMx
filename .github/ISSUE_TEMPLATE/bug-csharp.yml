name: Bug report — C# (VMx NuGet package)
description: Something is broken in the C# flavor.
labels: [bug, csharp]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      description: The C# flavor ships three independently-versioned NuGet packages.
      options:
        - VMx (core)
        - VMx.Extensions.DependencyInjection
        - VMx.Notifications
        - Not sure / multiple
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g., 2.1.0 (VMx core) / 1.1.0 (VMx.Notifications)
    validations:
      required: true
  - type: input
    id: tfm
    attributes:
      label: Target framework
      placeholder: e.g., net8.0, netstandard2.0
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest code snippet that reproduces the issue.
      render: csharp
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
