name: Bug report — Swift (VMx SwiftPM package)
description: Something is broken in the Swift flavor.
labels: [bug, swift]
body:
  - type: input
    id: version
    attributes:
      label: VMx version
      placeholder: e.g., 2.4.0
    validations:
      required: true
  - type: input
    id: swift
    attributes:
      label: Swift toolchain version
      placeholder: e.g., 6.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform (macOS / iOS / tvOS / watchOS) and OS version
      placeholder: e.g., macOS 15.2
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Smallest code snippet that reproduces the issue.
      render: swift
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
