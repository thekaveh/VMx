<text x="136" y="898" fill="white" font-size="13" font-weight="700" text-anchor="start">Key rule</text>
<text x="136" y="920" fill="#cbd5e1" font-size="12" font-weight="400" text-anchor="start">Lifecycle operations raise when called from an illegal state, while selection after Disposed is a silent no-op.</text>
<text x="136" y="938" fill="#cbd5e1" font-size="12" font-weight="400" text-anchor="start">That distinction matters for both conformance and view-adapter expectations.</text>
