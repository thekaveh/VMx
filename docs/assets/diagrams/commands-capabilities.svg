<text x="330" y="395" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">trigger observables re-fire CanExecuteChanged</text>
<text x="330" y="414" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">disposed command becomes inert</text>
