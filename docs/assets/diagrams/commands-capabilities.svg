<text x="330" y="198" fill="white" font-size="18" font-weight="700" text-anchor="middle">ICommand / ICommand&lt;T&gt;</text>
<text x="330" y="224" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">CanExecute / Execute / CanExecuteChanged</text>
<text x="330" y="243" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">parameterized variant when payload is needed</text>
