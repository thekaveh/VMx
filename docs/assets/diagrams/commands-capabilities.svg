<text x="330" y="373" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">trigger + imperative CanExecuteChanged</text>
<text x="330" y="392" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">disposed command becomes inert</text>
