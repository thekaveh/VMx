<text x="1180" y="784" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">CompositeVM.Current -&gt; ModeledCrudCommands triggers</text>
<text x="1180" y="803" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">ExpandableState delegates expansion capabilities</text>
<text x="1180" y="822" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">PagedComposition implements IPageable over a filtered source</text>
<text x="1180" y="841" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">FormVM and dialogs wire commands rather than grow a custom command type</text>
<rect x="130" y="948" width="1540" height="94" rx="8" fill="#111c2a"/>
<rect x="130" y="948" width="1540" height="94" rx="8" fill="rgba(15, 23, 42, 0.68)" stroke="#fb923c" stroke-width="1.2"/>
<text x="146" y="972" fill="white" font-size="13" font-weight="700" text-anchor="start">Why micro-interfaces matter</text>
<text x="146" y="994" fill="#cbd5e1" font-size="12" font-weight="400" text-anchor="start">Capability interfaces advertise exactly the verbs a VM supports, so command bars and view adapters can stay capability-based without reshaping the core VM hierarchy.</text>
