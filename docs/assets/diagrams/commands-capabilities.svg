<text x="330" y="528" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">execute every enabled inner command</text>
<text x="330" y="547" fill="#cbd5e1" font-size="13" font-weight="400" text-anchor="middle">aggregate CanExecute over children</text>
