<text x="136" y="622" fill="#cbd5e1" font-size="12" font-weight="400" text-anchor="start">ThemeVM remains a workspace-owned sibling rather than an AggregateVM7 child, while GlobalSearchVM demonstrates TokenPagedComposition.</text>
<text x="136" y="640" fill="#cbd5e1" font-size="12" font-weight="400" text-anchor="start">Views stay thin; adapter code owns the framework-native property, command, collection, dialog, and dispatcher bridges.</text>
