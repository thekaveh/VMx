# pre-commit configuration. Run `pre-commit install` once locally to wire the hooks.
# See https://pre-commit.com/ for details.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$   # markdown trailing whitespace can be meaningful (line breaks)
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--fix"]
        files: ^langs/python/.*\.py$
      - id: ruff-format
        files: ^langs/python/.*\.py$

  - repo: https://github.com/executablebooks/mdformat
    # mdformat 1.0.0 is incompatible with mdformat-gfm (requires mdformat <0.8.0).
    # Pinned to the latest 0.7.x until mdformat-gfm releases a 1.0-compatible version.
    rev: 0.7.22
    hooks:
      - id: mdformat
        files: ^(spec|docs)/.*\.md$
        additional_dependencies:
          - mdformat-gfm
          - mdformat-tables

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet format (C# only)
        # Build --include args via array so paths with spaces survive intact.
        entry: |
          bash -c '
            args=();
            for f in "$@"; do args+=("--include" "${f#langs/csharp/}"); done;
            cd langs/csharp && dotnet format VMx.sln --verify-no-changes "${args[@]}"
          ' --
        language: system
        files: ^langs/csharp/.*\.(cs|csproj|props)$
        pass_filenames: true

      - id: eslint-typescript
        name: eslint (TypeScript only)
        # Runs the flavor's own eslint config against staged .ts files. Requires
        # `npm ci` to have populated langs/typescript/node_modules first.
        entry: |
          bash -c '
            paths=();
            for f in "$@"; do paths+=("${f#langs/typescript/}"); done;
            cd langs/typescript && npx --no-install eslint "${paths[@]}"
          ' --
        language: system
        files: ^langs/typescript/(src|tests|scripts)/.*\.(ts|tsx|mjs|cjs|js)$
        pass_filenames: true
