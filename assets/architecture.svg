<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 820" width="1100" height="820" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <text x="40" y="38" fill="white" font-size="16" font-weight="700">VMx Architecture</text>
  <text x="40" y="58" fill="#94a3b8" font-size="11">Hierarchical lifecycle-aware MVVM viewmodel framework · spec-driven, multi-flavor</text>

  <!-- Spec banner (top) -->
  <rect x="40" y="80" width="1020" height="74" rx="8" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="550" y="106" fill="white" font-size="13" font-weight="600" text-anchor="middle">spec/ — language-neutral specification</text>
  <text x="550" y="126" fill="#94a3b8" font-size="10" text-anchor="middle">13 markdown chapters · 75 conformance IDs · 3 JSON fixtures · 7 ADRs · SemVer-tracked in spec/VERSION</text>
  <text x="550" y="144" fill="#a78bfa" font-size="9" text-anchor="middle">single source of truth — every flavor declares its MinSpecVersion</text>

  <!-- Spec → flavors arrows -->
  <line x1="280" y1="154" x2="220" y2="184" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-violet)"/>
  <line x1="550" y1="156" x2="550" y2="184" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-violet)"/>
  <line x1="820" y1="154" x2="880" y2="184" stroke="#a78bfa" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#arrow-violet)"/>
  <text x="100" y="172" fill="#a78bfa" font-size="8" font-style="italic">implements</text>

  <!-- Three flavor headers -->
  <rect x="120" y="188" width="200" height="54" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="220" y="208" fill="white" font-size="12" font-weight="600" text-anchor="middle">C#</text>
  <text x="220" y="224" fill="#94a3b8" font-size="9" text-anchor="middle">VMx 1.1.0 · netstandard2.0;net8.0</text>
  <text x="220" y="236" fill="#22d3ee" font-size="8" text-anchor="middle">System.Reactive</text>

  <rect x="450" y="188" width="200" height="54" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="208" fill="white" font-size="12" font-weight="600" text-anchor="middle">Python</text>
  <text x="550" y="224" fill="#94a3b8" font-size="9" text-anchor="middle">vmx 1.1.0 · Python 3.10–3.13</text>
  <text x="550" y="236" fill="#22d3ee" font-size="8" text-anchor="middle">reactivex</text>

  <rect x="780" y="188" width="200" height="54" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="880" y="208" fill="white" font-size="12" font-weight="600" text-anchor="middle">TypeScript</text>
  <text x="880" y="224" fill="#94a3b8" font-size="9" text-anchor="middle">vmx 1.1.0 · Node ≥18 · ESM + CJS</text>
  <text x="880" y="236" fill="#22d3ee" font-size="8" text-anchor="middle">rxjs</text>

  <!-- Convergence arrows from flavors into shared architecture -->
  <line x1="220" y1="242" x2="380" y2="290" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="550" y1="242" x2="550" y2="290" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="880" y1="242" x2="720" y2="290" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- "Shared library architecture" label band -->
  <text x="550" y="278" fill="#64748b" font-size="9" text-anchor="middle">— shared library architecture (idiomatic per flavor) —</text>

  <!-- Application layer -->
  <rect x="320" y="294" width="460" height="44" rx="6" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="314" fill="white" font-size="12" font-weight="600" text-anchor="middle">Application code</text>
  <text x="550" y="330" fill="#94a3b8" font-size="9" text-anchor="middle">host applications · WPF · Avalonia · MAUI · Tkinter · web / TUI</text>

  <line x1="550" y1="340" x2="550" y2="372" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="563" y="358" fill="#64748b" font-size="8" font-style="italic">uses</text>

  <!-- Forwarding layer (optional) -->
  <rect x="320" y="374" width="460" height="44" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="550" y="394" fill="white" font-size="12" font-weight="600" text-anchor="middle">Forwarding decorators (optional)</text>
  <text x="550" y="410" fill="#94a3b8" font-size="9" text-anchor="middle">ForwardingComponentVM · ForwardingCompositeVM</text>

  <line x1="550" y1="420" x2="550" y2="452" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="563" y="438" fill="#64748b" font-size="8" font-style="italic">wraps</text>

  <!-- VM types (central block) -->
  <rect x="150" y="454" width="800" height="100" rx="8" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="476" fill="white" font-size="13" font-weight="600" text-anchor="middle">ViewModel hierarchy</text>

  <rect x="180" y="490" width="170" height="50" rx="5" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
  <text x="265" y="508" fill="white" font-size="11" font-weight="600" text-anchor="middle">ComponentVM&lt;M&gt;</text>
  <text x="265" y="524" fill="#94a3b8" font-size="8" text-anchor="middle">leaf · model-bound · readonly variant</text>

  <rect x="370" y="490" width="170" height="50" rx="5" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
  <text x="455" y="508" fill="white" font-size="11" font-weight="600" text-anchor="middle">CompositeVM&lt;VM&gt;</text>
  <text x="455" y="524" fill="#94a3b8" font-size="8" text-anchor="middle">ordered children · Current selection</text>

  <rect x="560" y="490" width="170" height="50" rx="5" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
  <text x="645" y="508" fill="white" font-size="11" font-weight="600" text-anchor="middle">GroupVM&lt;VM&gt;</text>
  <text x="645" y="524" fill="#94a3b8" font-size="8" text-anchor="middle">peer children · no selection slot</text>

  <rect x="750" y="490" width="170" height="50" rx="5" fill="#0f172a" stroke="#34d399" stroke-width="1"/>
  <text x="835" y="508" fill="white" font-size="11" font-weight="600" text-anchor="middle">AggregateVM&lt;1..5&gt;</text>
  <text x="835" y="524" fill="#94a3b8" font-size="8" text-anchor="middle">fixed-arity heterogeneous VM tuple</text>

  <!-- Builders sidebar (right of VM types, slate) -->
  <rect x="966" y="454" width="124" height="100" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="1028" y="476" fill="white" font-size="11" font-weight="600" text-anchor="middle">Builders</text>
  <text x="1028" y="492" fill="#94a3b8" font-size="8" text-anchor="middle">immutable fluent</text>
  <text x="1028" y="506" fill="#94a3b8" font-size="8" text-anchor="middle">setter returns</text>
  <text x="1028" y="518" fill="#94a3b8" font-size="8" text-anchor="middle">new instance</text>
  <text x="1028" y="538" fill="#94a3b8" font-size="8" text-anchor="middle">.build() validates</text>

  <line x1="966" y1="504" x2="922" y2="504" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="942" y="497" fill="#94a3b8" font-size="8" text-anchor="middle" font-style="italic">construct</text>

  <!-- Fan-out arrows from VM types -->
  <line x1="265" y1="554" x2="170" y2="600" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="455" y1="554" x2="455" y2="600" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="645" y1="554" x2="645" y2="600" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="835" y1="554" x2="940" y2="600" stroke="#64748b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Row of runtime concerns: Commands · Messages · Tree -->
  <rect x="50" y="604" width="240" height="64" rx="6" fill="rgba(136, 19, 55, 0.4)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="170" y="624" fill="white" font-size="11" font-weight="600" text-anchor="middle">Commands</text>
  <text x="170" y="640" fill="#94a3b8" font-size="9" text-anchor="middle">RelayCommand · RelayCommand&lt;T&gt;</text>
  <text x="170" y="654" fill="#94a3b8" font-size="8" text-anchor="middle">execute + canExecute + reactive triggers</text>

  <rect x="335" y="604" width="240" height="64" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="455" y="624" fill="white" font-size="11" font-weight="600" text-anchor="middle">Messages</text>
  <text x="455" y="640" fill="#94a3b8" font-size="9" text-anchor="middle">PropertyChangedMessage&lt;T&gt;</text>
  <text x="455" y="654" fill="#94a3b8" font-size="9" text-anchor="middle">ConstructionStatusChangedMessage</text>

  <rect x="620" y="604" width="240" height="64" rx="6" fill="rgba(251, 146, 60, 0.3)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="740" y="624" fill="white" font-size="11" font-weight="600" text-anchor="middle">Collection events</text>
  <text x="740" y="640" fill="#94a3b8" font-size="9" text-anchor="middle">CollectionChangedEvent</text>
  <text x="740" y="654" fill="#94a3b8" font-size="8" text-anchor="middle">BatchUpdate · AutoConstructOnAdd (v1.1)</text>

  <rect x="905" y="604" width="180" height="64" rx="6" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="995" y="624" fill="white" font-size="11" font-weight="600" text-anchor="middle">Tree utilities</text>
  <text x="995" y="640" fill="#94a3b8" font-size="9" text-anchor="middle">walk(root) · find(root, pred)</text>
  <text x="995" y="654" fill="#34d399" font-size="8" text-anchor="middle">spec v1.1</text>

  <!-- Arrows from Commands/Messages/Collection/Tree to Services -->
  <line x1="170" y1="668" x2="240" y2="708" stroke="#64748b" stroke-width="1.1" marker-end="url(#arrow)"/>
  <line x1="455" y1="668" x2="320" y2="708" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="378" y="690" fill="#fb923c" font-size="8" font-style="italic">sent on</text>

  <line x1="455" y1="668" x2="455" y2="708" stroke="#64748b" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="740" y1="668" x2="740" y2="708" stroke="#fb923c" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Services row -->
  <rect x="180" y="710" width="340" height="58" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="350" y="732" fill="white" font-size="12" font-weight="600" text-anchor="middle">MessageHub</text>
  <text x="350" y="748" fill="#94a3b8" font-size="9" text-anchor="middle">rx Subject-backed pub/sub · per-subscriber exception isolation</text>
  <text x="350" y="762" fill="#94a3b8" font-size="8" text-anchor="middle">hub.messages.filter(...).subscribe(handler)</text>

  <rect x="555" y="710" width="340" height="58" rx="6" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="725" y="732" fill="white" font-size="12" font-weight="600" text-anchor="middle">RxDispatcher</text>
  <text x="725" y="748" fill="#94a3b8" font-size="9" text-anchor="middle">foreground · background scheduler pair</text>
  <text x="725" y="762" fill="#94a3b8" font-size="8" text-anchor="middle">immediate() · asyncio(loop) · UI-thread bound</text>

  <!-- Lifecycle (bottom orchestrator) -->
  <rect x="50" y="780" width="1035" height="28" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="76" y="800" fill="white" font-size="11" font-weight="600">Lifecycle state machine</text>
  <text x="568" y="800" fill="#fbbf24" font-size="10" font-weight="600">Destructed → Constructing → Constructed → Destructing → Disposed</text>
  <text x="1066" y="800" fill="#94a3b8" font-size="8" text-anchor="end">LIFE-001..013</text>

  <!-- Lifecycle governs all (vertical thin arrow to VM types) -->
  <line x1="30" y1="780" x2="30" y2="504" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="22" y="640" fill="#fbbf24" font-size="8" font-style="italic" transform="rotate(-90 22 640)">orchestrates</text>
</svg>
