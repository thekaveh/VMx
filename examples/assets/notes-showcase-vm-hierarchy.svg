<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" width="1100" height="900" font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrowhead-rose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb7185"/>
    </marker>
    <marker id="arrowhead-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" fill="#020617"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Root — WorkspaceVM -->
  <rect x="30" y="30" width="1040" height="74" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="2"/>
  <text x="550" y="54" fill="white" font-size="14" font-weight="700" text-anchor="middle">WorkspaceVM  :  AggregateVM6&lt;NotebooksRootVM, NotesViewVM, NoteFormVM, StatusBarVM, NotificationsVM, CapabilityActionsVM&gt;</text>
  <text x="550" y="74" fill="#94a3b8" font-size="9" text-anchor="middle">root aggregate · subscribes to children's Current + capability changes · marshals every cross-pane callback through Dispatcher.foreground (R4-Imp2)</text>
  <text x="550" y="92" fill="#22d3ee" font-size="9" text-anchor="middle">Component1 = NotebooksRootVM  ·  Component2 = NotesViewVM  ·  Component3 = NoteFormVM  ·  Component4 = StatusBarVM  ·  Component5 = NotificationsVM  ·  Component6 = CapabilityActionsVM</text>

  <!-- Top strip — CapabilityActionsVM + NotificationsVM -->
  <rect x="30" y="124" width="700" height="60" rx="6" fill="rgba(76, 29, 149, 0.35)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="380" y="144" fill="white" font-size="11" font-weight="600" text-anchor="middle">CapabilityActionsVM  :  ComponentVM</text>
  <text x="380" y="160" fill="#94a3b8" font-size="9" text-anchor="middle">reflects the capabilities of the currently-selected note (IDeletable / IUpdatable / ICreatable)</text>
  <text x="380" y="174" fill="#a78bfa" font-size="8" text-anchor="middle">DeleteCommand — wraps NoteVM.DeleteCommand in ConfirmationDecoratorCommand (R3-Crit1)</text>

  <rect x="745" y="124" width="325" height="60" rx="6" fill="rgba(136, 19, 55, 0.35)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="907" y="144" fill="white" font-size="11" font-weight="600" text-anchor="middle">NotificationsVM  :  GroupVM&lt;…&gt;</text>
  <text x="907" y="160" fill="#94a3b8" font-size="9" text-anchor="middle">toast + confirm overlay; subscribes to INotificationHub</text>
  <text x="907" y="174" fill="#fb7185" font-size="8" text-anchor="middle">renders NotificationVM + ConfirmationVM children</text>

  <!-- Left pane — NotebooksRootVM -->
  <rect x="30" y="200" width="320" height="430" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="190" y="222" fill="white" font-size="12" font-weight="700" text-anchor="middle">Left pane</text>
  <text x="190" y="240" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">NotebooksRootVM  :  HierarchicalVM&lt;NotebookModel, NotebookVM&gt;</text>
  <text x="190" y="258" fill="#94a3b8" font-size="9" text-anchor="middle">recursive notebook tree · ISelectable + IExpandable per node</text>
  <line x1="40" y1="270" x2="340" y2="270" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="2,2"/>
  <rect x="55" y="288" width="270" height="80" rx="6" fill="rgba(8, 51, 68, 0.5)" stroke="#22d3ee" stroke-width="1"/>
  <text x="190" y="308" fill="white" font-size="11" font-weight="600" text-anchor="middle">NotebookVM  :  HierarchicalVM&lt;…&gt;</text>
  <text x="190" y="324" fill="#94a3b8" font-size="9" text-anchor="middle">self-similar child · expands on demand</text>
  <text x="190" y="338" fill="#94a3b8" font-size="9" text-anchor="middle">children: NotebookVM*  (recursive)</text>
  <text x="190" y="356" fill="#22d3ee" font-size="8" text-anchor="middle">spec/18 · HIER-001..014</text>
  <text x="190" y="394" fill="#94a3b8" font-size="9" text-anchor="middle">publishes:</text>
  <text x="190" y="408" fill="#e2e8f0" font-size="9" text-anchor="middle">PropertyChanged("Current")</text>
  <text x="190" y="422" fill="#e2e8f0" font-size="9" text-anchor="middle">TreeStructureChangedMessage</text>
  <line x1="55" y1="442" x2="325" y2="442" stroke="#22d3ee" stroke-width="0.4" stroke-dasharray="2,2"/>
  <text x="190" y="460" fill="#94a3b8" font-size="9" text-anchor="middle">commands (CapabilityActionsVM):</text>
  <text x="190" y="476" fill="#e2e8f0" font-size="9" text-anchor="middle">CreateNotebookCommand</text>
  <text x="190" y="490" fill="#e2e8f0" font-size="9" text-anchor="middle">RenameNotebookCommand</text>
  <text x="190" y="504" fill="#e2e8f0" font-size="9" text-anchor="middle">DeleteNotebookCommand</text>
  <text x="190" y="516" fill="#fb7185" font-size="8" text-anchor="middle">↘ posts to NotificationHub</text>
  <text x="190" y="558" fill="#94a3b8" font-size="9" text-anchor="middle">data source:</text>
  <text x="190" y="572" fill="#e2e8f0" font-size="9" text-anchor="middle">InMemoryRepository.list_notebooks()</text>
  <text x="190" y="618" fill="#22d3ee" font-size="8" text-anchor="middle">Pure-VM contract enforced via check-layer-imports.py</text>

  <!-- Center pane — NotesViewVM -->
  <rect x="370" y="200" width="320" height="430" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="530" y="222" fill="white" font-size="12" font-weight="700" text-anchor="middle">Center pane</text>
  <text x="530" y="240" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">NotesViewVM  :  CompositeVM&lt;NoteVM&gt;</text>
  <text x="530" y="256" fill="#94a3b8" font-size="9" text-anchor="middle">PagedComposition + SearchableState&lt;NoteVM&gt; + IFilterable</text>
  <line x1="380" y1="270" x2="680" y2="270" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="2,2"/>
  <rect x="395" y="288" width="270" height="80" rx="6" fill="rgba(8, 51, 68, 0.5)" stroke="#22d3ee" stroke-width="1"/>
  <text x="530" y="308" fill="white" font-size="11" font-weight="600" text-anchor="middle">NoteVM  :  ComponentVM&lt;NoteModel&gt;</text>
  <text x="530" y="324" fill="#94a3b8" font-size="9" text-anchor="middle">per-note VM · IDeletable + IUpdatable</text>
  <text x="530" y="338" fill="#94a3b8" font-size="9" text-anchor="middle">DeleteCommand wrapped in</text>
  <text x="530" y="352" fill="#a78bfa" font-size="9" text-anchor="middle">ConfirmationDecoratorCommand</text>
  <text x="530" y="392" fill="#94a3b8" font-size="9" text-anchor="middle">surface:</text>
  <text x="530" y="406" fill="#e2e8f0" font-size="9" text-anchor="middle">Items : ObservableList&lt;NoteVM&gt;</text>
  <text x="530" y="420" fill="#e2e8f0" font-size="9" text-anchor="middle">Current : NoteVM?</text>
  <text x="530" y="434" fill="#e2e8f0" font-size="9" text-anchor="middle">SearchTerm : SearchableState</text>
  <text x="530" y="448" fill="#e2e8f0" font-size="9" text-anchor="middle">Filter (predicate) : IFilterable</text>
  <text x="530" y="462" fill="#e2e8f0" font-size="9" text-anchor="middle">Page / PageSize : IPageable</text>
  <line x1="395" y1="478" x2="665" y2="478" stroke="#22d3ee" stroke-width="0.4" stroke-dasharray="2,2"/>
  <text x="530" y="496" fill="#94a3b8" font-size="9" text-anchor="middle">commands:</text>
  <text x="530" y="510" fill="#e2e8f0" font-size="9" text-anchor="middle">CreateNoteCommand · DeleteNoteCommand</text>
  <text x="530" y="524" fill="#e2e8f0" font-size="9" text-anchor="middle">RenameNoteCommand</text>
  <text x="530" y="538" fill="#fb7185" font-size="8" text-anchor="middle">↘ posts Created/Deleted notifications</text>
  <text x="530" y="568" fill="#94a3b8" font-size="9" text-anchor="middle">data source:</text>
  <text x="530" y="582" fill="#e2e8f0" font-size="9" text-anchor="middle">InMemoryRepository.notes_for(notebook)</text>
  <text x="530" y="618" fill="#22d3ee" font-size="8" text-anchor="middle">filter BEFORE marshal (R5-Imp parity)</text>

  <!-- Right pane — NoteFormVM -->
  <rect x="710" y="200" width="360" height="430" rx="8" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="890" y="222" fill="white" font-size="12" font-weight="700" text-anchor="middle">Right pane</text>
  <text x="890" y="240" fill="#22d3ee" font-size="11" font-weight="600" text-anchor="middle">NoteFormVM  :  FormVM&lt;NoteModel&gt;</text>
  <text x="890" y="256" fill="#94a3b8" font-size="9" text-anchor="middle">snapshot / revert editor · re-binds when NotesView.Current changes</text>
  <line x1="720" y1="270" x2="1060" y2="270" stroke="#22d3ee" stroke-width="0.5" stroke-dasharray="2,2"/>
  <text x="890" y="292" fill="#94a3b8" font-size="9" text-anchor="middle">surface (form state):</text>
  <text x="890" y="306" fill="#e2e8f0" font-size="9" text-anchor="middle">Title : string (validated)</text>
  <text x="890" y="320" fill="#e2e8f0" font-size="9" text-anchor="middle">Body : string</text>
  <text x="890" y="334" fill="#e2e8f0" font-size="9" text-anchor="middle">Tags : ObservableList&lt;string&gt;</text>
  <text x="890" y="348" fill="#e2e8f0" font-size="9" text-anchor="middle">TagDraft : SearchableState&lt;string&gt;</text>
  <text x="890" y="362" fill="#e2e8f0" font-size="9" text-anchor="middle">IsDirty : DerivedProperty&lt;bool&gt;</text>
  <text x="890" y="394" fill="#94a3b8" font-size="9" text-anchor="middle">commands:</text>
  <text x="890" y="408" fill="#e2e8f0" font-size="9" text-anchor="middle">SaveCommand · RevertCommand</text>
  <text x="890" y="422" fill="#e2e8f0" font-size="9" text-anchor="middle">AddTagCommand · RemoveTagCommand</text>
  <text x="890" y="436" fill="#fb7185" font-size="8" text-anchor="middle">↘ posts Saved/Reverted notifications</text>
  <line x1="730" y1="450" x2="1060" y2="450" stroke="#22d3ee" stroke-width="0.4" stroke-dasharray="2,2"/>
  <text x="890" y="468" fill="#94a3b8" font-size="9" text-anchor="middle">lifecycle wiring (R3-Crit2):</text>
  <text x="890" y="482" fill="#e2e8f0" font-size="9" text-anchor="middle">BindTo(NoteVM? current)</text>
  <text x="890" y="496" fill="#94a3b8" font-size="8" text-anchor="middle">- subscribes Workspace observes</text>
  <text x="890" y="508" fill="#94a3b8" font-size="8" text-anchor="middle">  NotesView.Current → BindTo(current)</text>
  <text x="890" y="522" fill="#94a3b8" font-size="8" text-anchor="middle">- handles null Current (R4-Imp1)</text>
  <text x="890" y="536" fill="#94a3b8" font-size="8" text-anchor="middle">- resets TagDraft on unbind (R5-Min)</text>
  <text x="890" y="568" fill="#94a3b8" font-size="9" text-anchor="middle">data source:</text>
  <text x="890" y="582" fill="#e2e8f0" font-size="9" text-anchor="middle">InMemoryRepository.update(noteModel)</text>
  <text x="890" y="618" fill="#22d3ee" font-size="8" text-anchor="middle">snapshot/revert per spec/20 · FORM-001..010</text>

  <!-- Bottom strip — StatusBarVM -->
  <rect x="30" y="650" width="1040" height="56" rx="6" fill="rgba(8, 51, 68, 0.35)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="670" fill="white" font-size="11" font-weight="600" text-anchor="middle">StatusBarVM  :  ComponentVM</text>
  <text x="550" y="686" fill="#94a3b8" font-size="9" text-anchor="middle">DerivedProperty&lt;string&gt;  ·  N-source: NotebooksRoot.Current + NotesView.Items.Count + NoteForm.IsDirty</text>
  <text x="550" y="700" fill="#22d3ee" font-size="8" text-anchor="middle">view-bound text only · no commands · purely a function of the other VMs' state</text>

  <!-- Models -->
  <rect x="30" y="724" width="500" height="80" rx="6" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="280" y="744" fill="white" font-size="11" font-weight="600" text-anchor="middle">Models  (readonly records / dataclasses)</text>
  <text x="280" y="762" fill="#94a3b8" font-size="9" text-anchor="middle">immutable snapshots; carried by ComponentVMOf and FormVM&lt;M&gt;</text>
  <text x="160" y="784" fill="#e2e8f0" font-size="10" text-anchor="middle">NotebookModel</text>
  <text x="160" y="797" fill="#94a3b8" font-size="8" text-anchor="middle">id · name · parent_id · child_ids</text>
  <text x="400" y="784" fill="#e2e8f0" font-size="10" text-anchor="middle">NoteModel</text>
  <text x="400" y="797" fill="#94a3b8" font-size="8" text-anchor="middle">id · notebook_id · title · body · tags · timestamps</text>

  <!-- Repository -->
  <rect x="550" y="724" width="520" height="80" rx="6" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="810" y="744" fill="white" font-size="11" font-weight="600" text-anchor="middle">InMemoryRepository  :  ICreatable&lt;T&gt; · IReadable&lt;K&gt; · IUpdatable&lt;T&gt; · IDeletable</text>
  <text x="810" y="762" fill="#94a3b8" font-size="9" text-anchor="middle">capability-aware single source of truth · fan-out to all 3 panes via the CRUD micro-interfaces</text>
  <text x="810" y="782" fill="#e2e8f0" font-size="9" text-anchor="middle">list_notebooks() · notes_for(notebook_id) · save(noteModel) · delete(noteId)</text>
  <text x="810" y="797" fill="#a78bfa" font-size="8" text-anchor="middle">parity: same surface across C# Avalonia · Python Textual · TS React</text>

  <!-- Cross-pane Rx subscription arrows -->
  <path d="M 350 415 C 360 415 360 415 370 415" fill="none" stroke="#22d3ee" stroke-width="1.4" marker-end="url(#arrowhead-cyan)"/>
  <text x="360" y="405" fill="#22d3ee" font-size="8" text-anchor="middle">Current</text>

  <path d="M 690 415 C 700 415 700 415 710 415" fill="none" stroke="#22d3ee" stroke-width="1.4" marker-end="url(#arrowhead-cyan)"/>
  <text x="700" y="405" fill="#22d3ee" font-size="8" text-anchor="middle">Current</text>
  <text x="700" y="430" fill="#22d3ee" font-size="7" text-anchor="middle">→ BindTo</text>

  <path d="M 530 200 L 530 170 Q 530 154 480 154 L 460 154" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arrowhead-violet)"/>
  <text x="540" y="178" fill="#a78bfa" font-size="8">capabilities</text>

  <path d="M 665 332 Q 720 200 800 184" fill="none" stroke="#fb7185" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrowhead-rose)"/>
  <text x="745" y="240" fill="#fb7185" font-size="8" text-anchor="middle">Notification.Post(Confirm?)</text>

  <path d="M 250 510 Q 360 280 800 184" fill="none" stroke="#fb7185" stroke-width="1.0" stroke-dasharray="3,3" marker-end="url(#arrowhead-rose)"/>
  <path d="M 1000 436 Q 1060 280 1060 184" fill="none" stroke="#fb7185" stroke-width="1.0" stroke-dasharray="3,3" marker-end="url(#arrowhead-rose)"/>

  <!-- Repository fan-out -->
  <path d="M 700 724 Q 600 680 200 632" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-dasharray="4,2" marker-end="url(#arrowhead-violet)"/>
  <path d="M 800 724 Q 700 680 530 632" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-dasharray="4,2" marker-end="url(#arrowhead-violet)"/>
  <path d="M 900 724 Q 900 680 890 632" fill="none" stroke="#a78bfa" stroke-width="1.0" stroke-dasharray="4,2" marker-end="url(#arrowhead-violet)"/>
  <text x="660" y="710" fill="#a78bfa" font-size="8" text-anchor="middle">CRUD fan-out</text>

  <!-- Hub + Dispatcher DI annotation -->
  <rect x="30" y="826" width="1040" height="40" rx="6" fill="rgba(6, 78, 59, 0.15)" stroke="#34d399" stroke-width="0.8" stroke-dasharray="3,3"/>
  <text x="50" y="843" fill="#34d399" font-size="10" font-weight="600">Every VM above receives:</text>
  <text x="50" y="858" fill="#94a3b8" font-size="9">  MessageHub  (publishes PropertyChanged / TreeStructureChanged)   ·   Dispatcher  (observe_on(foreground) before view callbacks · R4-Imp2)   ·   INotificationHub  (for VMs that post)</text>

  <!-- Legend -->
  <rect x="30" y="876" width="18" height="12" rx="3" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="55" y="886" fill="#94a3b8" font-size="9">Example-app VMs</text>
  <rect x="170" y="876" width="18" height="12" rx="3" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="195" y="886" fill="#94a3b8" font-size="9">v2.0+v2.1 VMx primitives</text>
  <rect x="340" y="876" width="18" height="12" rx="3" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="365" y="886" fill="#94a3b8" font-size="9">Models</text>
  <rect x="420" y="876" width="18" height="12" rx="3" fill="rgba(136, 19, 55, 0.35)" stroke="#fb7185" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="445" y="886" fill="#94a3b8" font-size="9">Notification overlay</text>
  <line x1="570" y1="882" x2="600" y2="882" stroke="#22d3ee" stroke-width="1.4" marker-end="url(#arrowhead-cyan)"/>
  <text x="610" y="886" fill="#94a3b8" font-size="9">Rx subscription</text>
  <line x1="720" y1="882" x2="750" y2="882" stroke="#fb7185" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrowhead-rose)"/>
  <text x="760" y="886" fill="#94a3b8" font-size="9">Notification post</text>
  <line x1="870" y1="882" x2="900" y2="882" stroke="#a78bfa" stroke-width="1.0" stroke-dasharray="4,2" marker-end="url(#arrowhead-violet)"/>
  <text x="910" y="886" fill="#94a3b8" font-size="9">Capability / CRUD</text>
</svg>
